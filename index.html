<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Franklin Weather">
    <link rel="apple-touch-icon" href="./icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="152x152" href="./icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="167x167" href="./icons/icon-192.png">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#080c14">
    <link rel="manifest" href="./manifest.json">
    
    <meta name="description" content="Real-time weather from personal weather stations in Franklin, Tennessee">
    <title>Franklin TN Real-Time Weather</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #06090f;
            --bg-card: #0d131f;
            --bg-elevated: #141b29;
            --border-subtle: rgba(255,255,255,0.04);
            --border-medium: rgba(255,255,255,0.08);
            --text-primary: #f8fafc;
            --text-secondary: rgba(248,250,252,0.65);
            --text-muted: rgba(248,250,252,0.35);
            --accent-cyan: #22d3ee;
            --accent-emerald: #10b981;
            --accent-amber: #f59e0b;
            --accent-orange: #f97316;
            --accent-rose: #f43f5e;
            --accent-purple: #a78bfa;
            --accent-blue: #3b82f6;
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 28px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { height: 100%; -webkit-font-smoothing: antialiased; }
        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
            min-height: 100%;
            padding: 16px;
            padding-top: max(16px, env(safe-area-inset-top));
            padding-bottom: max(100px, calc(env(safe-area-inset-bottom) + 100px));
            line-height: 1.4;
        }
        .container { max-width: 440px; margin: 0 auto; }

        /* Header */
        .header { text-align: center; padding: 12px 0 28px; }
        .clock { margin-bottom: 20px; }
        .clock-day { font-size: 10px; font-weight: 700; letter-spacing: 5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
        .clock-time { font-family: 'Space Grotesk', monospace; font-size: 52px; font-weight: 700; letter-spacing: -2.5px; background: linear-gradient(180deg, var(--text-primary) 30%, rgba(248,250,252,0.4) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .clock-date { font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-top: 4px; letter-spacing: -0.2px; }
        .brand { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 100px; }
        .brand-icon { font-size: 16px; }
        .brand-text { font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: -0.2px; color: var(--text-secondary); }
        .status-live { display: inline-flex; align-items: center; gap: 6px; margin-top: 14px; font-size: 10px; font-weight: 700; color: var(--accent-emerald); text-transform: uppercase; letter-spacing: 1.5px; }
        .status-dot { width: 5px; height: 5px; background: var(--accent-emerald); border-radius: 50%; box-shadow: 0 0 8px var(--accent-emerald); animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Station Card */
        .station { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-xl); margin-bottom: 24px; overflow: hidden; box-shadow: 0 12px 40px -12px rgba(0,0,0,0.5); }
        .station-header { display: flex; justify-content: space-between; align-items: flex-start; padding: 24px 24px 0; }
        .station-name { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 3px; }
        .station-location { font-size: 12px; font-weight: 500; color: var(--text-muted); }
        .station-status { display: flex; align-items: center; gap: 5px; padding: 4px 10px; background: rgba(16, 185, 129, 0.08); border: 1px solid rgba(16, 185, 129, 0.15); border-radius: 100px; font-size: 9px; font-weight: 700; color: var(--accent-emerald); text-transform: uppercase; letter-spacing: 0.5px; }
        .station-status.offline { background: rgba(244, 63, 94, 0.08); border-color: rgba(244, 63, 94, 0.15); color: var(--accent-rose); }

        /* Comfort Score */
        .comfort-section { padding: 28px 24px 20px; text-align: center; position: relative; }
        .comfort-ring-wrap { position: relative; width: 160px; height: 160px; margin: 0 auto 18px; }
        .comfort-ring-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
        .comfort-ring-bg { fill: none; stroke: var(--bg-elevated); stroke-width: 11; }
        .comfort-ring-fill { fill: none; stroke-width: 11; stroke-linecap: round; transition: stroke-dashoffset 1.2s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.5s ease; }
        .comfort-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 100%; }
        .comfort-value { font-family: 'Space Grotesk', monospace; font-size: 54px; font-weight: 700; line-height: 1; letter-spacing: -2px; }
        .comfort-label { font-size: 13px; font-weight: 700; margin-top: 2px; text-transform: uppercase; letter-spacing: 1.5px; }
        .comfort-desc { font-size: 14px; color: var(--text-secondary); max-width: 290px; margin: 0 auto 16px; line-height: 1.45; font-weight: 400; }
        .comfort-tags { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
        .comfort-tag { display: inline-flex; align-items: center; gap: 4px; padding: 5px 12px; background: var(--bg-elevated); border: 1px solid var(--border-subtle); border-radius: 100px; font-size: 11px; font-weight: 500; color: var(--text-secondary); }

        /* Temperature */
        .temp-section { display: flex; align-items: center; justify-content: center; gap: 24px; padding: 0 24px 28px; }
        .temp-main { text-align: center; }
        .temp-value { font-family: 'Space Grotesk', monospace; font-size: 76px; font-weight: 700; line-height: 0.85; letter-spacing: -4px; position: relative; left: 4px; }
        .temp-value .deg { font-size: 28px; font-weight: 400; opacity: 0.4; vertical-align: top; margin-left: -4px; }
        .temp-feels { font-size: 13px; color: var(--text-secondary); margin-top: 8px; font-weight: 400; }
        .temp-feels strong { color: var(--text-primary); font-weight: 600; }
        .condition-chip { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 14px 18px; background: var(--bg-elevated); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); min-width: 96px; }
        .condition-icon { font-size: 28px; }
        .condition-text { font-size: 12px; font-weight: 600; color: var(--text-secondary); letter-spacing: -0.1px; }

        /* Wind */
        .wind-section { display: flex; align-items: center; gap: 20px; padding: 0 24px 24px; }
        .compass-container { position: relative; width: 88px; height: 88px; flex-shrink: 0; }
        .compass-ring { position: absolute; inset: 0; border: 1px solid var(--border-medium); border-radius: 50%; background: var(--bg-elevated); }
        .compass-dirs { position: absolute; inset: 6px; font-size: 9px; font-weight: 700; color: var(--text-muted); }
        .compass-dirs span { position: absolute; }
        .compass-dirs .n { top: 2px; left: 50%; transform: translateX(-50%); color: var(--text-primary); }
        .compass-dirs .s { bottom: 2px; left: 50%; transform: translateX(-50%); }
        .compass-dirs .e { right: 2px; top: 50%; transform: translateY(-50%); }
        .compass-dirs .w { left: 2px; top: 50%; transform: translateY(-50%); }
        .compass-needle { position: absolute; top: 50%; left: 50%; width: 3px; height: 34px; transform-origin: bottom center; transform: translate(-50%, -100%) rotate(0deg); transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .compass-needle::before { content: ''; position: absolute; top: 0; left: -4px; border-left: 5.5px solid transparent; border-right: 5.5px solid transparent; border-bottom: 18px solid var(--accent-cyan); filter: drop-shadow(0 0 6px var(--accent-cyan)); }
        .compass-center-dot { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 10px; height: 10px; background: var(--text-primary); border-radius: 50%; box-shadow: 0 0 0 2px var(--bg-elevated); }
        .wind-info { flex: 1; }
        .wind-speed { font-family: 'Space Grotesk', monospace; font-size: 38px; font-weight: 700; line-height: 1; letter-spacing: -1px; }
        .wind-speed .unit { font-size: 15px; font-weight: 500; color: var(--text-secondary); margin-left: 2px; }
        .wind-direction-text { font-size: 13px; color: var(--text-secondary); margin-top: 3px; font-weight: 400; }
        .wind-gust-alert { display: inline-flex; align-items: center; gap: 5px; margin-top: 8px; padding: 4px 10px; background: rgba(249, 115, 22, 0.08); border: 1px solid rgba(249, 115, 22, 0.15); border-radius: 100px; font-size: 11px; font-weight: 600; color: var(--accent-orange); }

        /* Data Grid */
        .data-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border-subtle); border-top: 1px solid var(--border-subtle); }
        .data-cell { background: var(--bg-card); padding: 16px 10px; text-align: center; }
        .data-icon { font-size: 18px; margin-bottom: 6px; }
        .data-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: var(--text-muted); margin-bottom: 3px; }
        .data-value { font-family: 'Space Grotesk', monospace; font-size: 19px; font-weight: 700; color: var(--text-primary); }
        .data-value .unit { font-size: 11px; font-weight: 500; color: var(--text-secondary); }

        /* Lightning Tracking */
        .lightning-section { display: flex; align-items: center; gap: 16px; padding: 16px 20px; background: var(--bg-elevated); border-top: 1px solid var(--border-subtle); position: relative; transition: all 0.3s ease; }
        .lightning-section.active-strikes { background: linear-gradient(135deg, rgba(167, 139, 250, 0.08) 0%, rgba(139, 92, 246, 0.03) 100%); }
        .lightning-icon-wrap { width: 44px; height: 44px; background: var(--bg-card); border: 1px solid var(--border-medium); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--text-muted); transition: all 0.3s ease; }
        .lightning-section.active-strikes .lightning-icon-wrap { background: linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%); color: #fff; border: none; box-shadow: 0 0 16px rgba(167, 139, 250, 0.4); }
        .lightning-info h4 { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: var(--text-muted); margin-bottom: 1px; }
        .lightning-count { font-family: 'Space Grotesk', monospace; font-size: 24px; font-weight: 700; color: var(--text-secondary); }
        .lightning-section.active-strikes .lightning-count { color: var(--accent-purple); text-shadow: 0 0 10px rgba(167, 139, 250, 0.2); }
        .lightning-count .period { font-size: 12px; font-weight: 500; color: var(--text-muted); margin-left: 3px; }

        /* Forecast */
        .forecast-toggle { width: 100%; padding: 16px 20px; background: transparent; border: none; border-top: 1px solid var(--border-subtle); color: var(--text-secondary); font-family: inherit; font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer; transition: background 0.2s, color 0.2s; }
        .forecast-toggle:active { background: var(--bg-elevated); }
        .forecast-toggle svg { transition: transform 0.3s ease; opacity: 0.6; }
        .forecast-toggle.open { color: var(--text-primary); background: rgba(255,255,255,0.01); }
        .forecast-toggle.open svg { transform: rotate(180deg); opacity: 1; }
        .forecast-content { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1); background: rgba(0,0,0,0.1); }
        .forecast-content.open { max-height: 800px; }
        .forecast-item { padding: 16px 20px; border-top: 1px solid var(--border-subtle); }
        .forecast-period { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--accent-blue); margin-bottom: 4px; }
        .forecast-narrative { font-size: 13.5px; line-height: 1.5; color: var(--text-secondary); }

        /* Dynamic Sports Card styles */
        .sports-card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-xl); padding: 20px; margin-bottom: 24px; box-shadow: 0 12px 40px -12px rgba(0,0,0,0.5); }
        .sports-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .sports-title { font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 6px; letter-spacing: -0.2px; }
        .sports-pill { padding: 4px 10px; border-radius: 100px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; border: 1px solid rgba(59, 130, 246, 0.15); background: rgba(59, 130, 246, 0.06); color: var(--accent-blue); }

        /* Sun Tracker */
        .sun-card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-xl); padding: 20px; margin-bottom: 24px; box-shadow: 0 12px 40px -12px rgba(0,0,0,0.5); }
        .sun-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .sun-title { font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 6px; letter-spacing: -0.2px; }
        .golden-pill { padding: 4px 10px; border-radius: 100px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; border: 1px solid transparent; }
        .golden-pill.active { background: linear-gradient(135deg, rgba(251, 191, 36, 0.15) 0%, rgba(245, 158, 11, 0.15) 100%); border-color: rgba(251, 191, 36, 0.2); color: var(--accent-amber); animation: goldenGlow 2.5s ease-in-out infinite; }
        .golden-pill.soon { background: rgba(251, 191, 36, 0.06); border-color: rgba(251, 191, 36, 0.1); color: var(--accent-amber); }
        .golden-pill.inactive { background: var(--bg-elevated); border-color: var(--border-subtle); color: var(--text-muted); }
        @keyframes goldenGlow { 0%, 100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); } 50% { box-shadow: 0 0 16px 2px rgba(251, 191, 36, 0.12); } }
        .sun-arc-wrap { position: relative; height: 80px; margin-bottom: 12px; overflow: hidden; }
        .sun-arc { position: absolute; bottom: 0; left: 6%; width: 88%; height: 140px; border: 1.5px dashed rgba(255,255,255,0.06); border-radius: 50%; }
        .sun-marker { position: absolute; width: 28px; height: 28px; background: var(--accent-amber); border-radius: 50%; transform: translate(-50%, 50%); display: flex; align-items: center; justify-content: center; font-size: 14px; box-shadow: 0 0 20px var(--accent-amber); transition: all 0.5s ease; }
        .sun-horizon { position: absolute; bottom: 0; left: 2%; width: 96%; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent); }
        .sun-times-row { display: flex; justify-content: space-between; padding: 0 4%; font-size: 11px; font-weight: 500; color: var(--text-muted); margin-bottom: 16px; }
        .sun-stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .sun-stat { text-align: center; padding: 12px; background: var(--bg-elevated); border: 1px solid var(--border-subtle); border-radius: var(--radius-sm); }
        .sun-stat-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 2px; }
        .sun-stat-value { font-family: 'Space Grotesk', monospace; font-size: 17px; font-weight: 700; color: var(--text-primary); }
        .sun-stat-value.gold { color: var(--accent-amber); }

        /* Bottom Bar */
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 16px 24px; padding-bottom: max(16px, env(safe-area-inset-bottom)); background: linear-gradient(to top, var(--bg-base) 60%, transparent); display: flex; justify-content: center; align-items: center; gap: 24px; z-index: 1000; }
        .countdown-text { font-family: 'Space Grotesk', monospace; font-size: 13px; font-weight: 600; color: var(--text-muted); min-width: 44px; text-align: center; }
        .refresh-btn { width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%); border: none; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 6px 24px -6px rgba(59, 130, 246, 0.5); transition: transform 0.2s, box-shadow 0.2s; }
        .refresh-btn:active { transform: scale(0.94); }
        .refresh-btn.spinning svg { animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Loading State */
        .loading-state { text-align: center; padding: 64px 20px; }
        .loading-spinner { width: 40px; height: 40px; border: 2.5px solid var(--bg-elevated); border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        .loading-text { font-size: 13px; font-weight: 500; color: var(--text-secondary); letter-spacing: -0.1px; }
        .error-state { padding: 20px; background: rgba(244, 63, 94, 0.05); border: 1px solid rgba(244, 63, 94, 0.12); border-radius: var(--radius-md); text-align: center; font-size: 13px; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="clock">
                <div class="clock-day" id="clockDay">---</div>
                <div class="clock-time" id="clockTime">--:--</div>
                <div class="clock-date" id="clockDate">---</div>
            </div>
            <div class="brand">
                <span class="brand-icon">☀️</span>
                <span class="brand-text">Franklin TN Real-Time Weather</span>
            </div>
            <div class="status-live">
                <span class="status-dot"></span>
                Live Data
            </div>
        </header>

        <main id="content">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <div class="loading-text">Connecting to stations...</div>
            </div>
        </main>

        <div class="sports-card" id="cubsCard" style="display: none;">
            <div class="sports-header">
                <span class="sun-title">🐻 Chicago Cubs Tracker</span>
                <span class="sports-pill">MLB</span>
            </div>
            <div class="sun-stats-row" style="grid-template-columns: 1fr; gap: 10px;">
                <div class="sun-stat" style="text-align: left;">
                    <div class="sun-stat-label">Next Chicago Cubs Game Coming Up</div>
                    <div class="sun-stat-value" id="cubsNextGame" style="font-family: inherit; font-size: 14px; margin-top: 4px; line-height: 1.4;">--</div>
                </div>
                <div class="sun-stat" style="text-align: left;">
                    <div class="sun-stat-label">Previous Game Final Score</div>
                    <div class="sun-stat-value gold" id="cubsPrevGame" style="font-size: 15px; margin-top: 4px;">--</div>
                </div>
            </div>
        </div>

        <div class="sun-card" id="sunCard" style="display: none;">
            <div class="sun-header">
                <span class="sun-title">🚁 Golden Hour Tracker</span>
                <span class="golden-pill inactive" id="goldenPill">Golden Hour</span>
            </div>
            <div class="sun-arc-wrap">
                <div class="sun-arc"></div>
                <div class="sun-marker" id="sunMarker">☀️</div>
                <div class="sun-horizon"></div>
            </div>
            <div class="sun-times-row">
                <span id="sunriseTime">--:--</span>
                <span id="sunsetTime">--:--</span>
            </div>
            <div class="sun-stats-row">
                <div class="sun-stat">
                    <div class="sun-stat-label">Daylight Left</div>
                    <div class="sun-stat-value" id="daylightLeft">--</div>
                </div>
                <div class="sun-stat">
                    <div class="sun-stat-label">Golden Hour</div>
                    <div class="sun-stat-value gold" id="goldenTime">--</div>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-bar">
        <span class="countdown-text" id="countdown">60s</span>
        <button class="refresh-btn" onclick="refresh()" id="refreshBtn">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12a9 9 0 11-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
                <path d="M21 3v5h-5"/>
            </svg>
        </button>
        <span class="countdown-text" style="opacity: 0;">60s</span>
    </div>

    <script>
        const API_KEY = 'c3fd2f9b93a64c1abd2f9b93a6ec1a87';
        
        const STATIONS = [
            { id: 'KTNFRANK244', name: 'Battlefield Park', location: 'Columbia Ave & Battle Ave', hasSolar: true, hasLightning: true },
            { id: 'KTNFRANK375', name: 'Heath Place', location: 'Off Carnton Lane', hasSolar: false, hasLightning: false }
        ];

        let countdown = 60;
        let sunData = null;

        function calculateComfortIndex(data) {
            if (!data) return { score: 0, label: 'Unknown', desc: 'No data available', color: '#666', tags: [] };

            const temp = data.imperial?.temp;
            const humidity = data.humidity;
            const dewpt = data.imperial?.dewpt;
            const windSpeed = data.imperial?.windSpeed ?? 0;
            const windGust = data.imperial?.windGust ?? 0;
            const windChill = data.imperial?.windChill;
            const heatIndex = data.imperial?.heatIndex;
            const uv = data.uv ?? 0;
            const precipRate = data.imperial?.precipRate ?? 0;

            if (temp == null) return { score: 0, label: 'Unknown', desc: 'Core parameters missing', color: '#666', tags: [] };

            let effective = temp;
            if (temp <= 52 && windSpeed > 3 && windChill != null) effective = windChill;
            else if (temp >= 78 && heatIndex != null) effective = heatIndex;

            let tags = [];

            let thermalScore = 100;
            if (effective >= 68 && effective <= 74) {
                thermalScore = 100;
            } else if (effective > 74) {
                if (effective <= 78) thermalScore = 95;
                else if (effective <= 83) { thermalScore = 82; tags.push('Warm'); }
                else if (effective <= 88) { thermalScore = 65; tags.push('🌡️ Hot'); }
                else if (effective <= 94) { thermalScore = 40; tags.push('🔥 Very Hot'); }
                else if (effective <= 102) { thermalScore = 18; tags.push('🥵 Intense Heat'); }
                else { thermalScore = 5; tags.push('☠️ Extreme Heat'); }
            } else {
                if (effective >= 62) thermalScore = 92;
                else if (effective >= 55) { thermalScore = 78; tags.push('Cool'); }
                else if (effective >= 45) { thermalScore = 60; tags.push('Chilly'); }
                else if (effective >= 32) { thermalScore = 38; tags.push('🥶 Cold'); }
                else if (effective >= 15) { thermalScore = 18; tags.push('🥶 Freezing'); }
                else { thermalScore = 5; tags.push('❄️ Bitter Cold'); }
            }

            let humidityScore = 100;
            if (dewpt != null && temp > 55) {
                if (dewpt >= 76) { humidityScore = 10; tags.push('💦 Oppressive'); }
                else if (dewpt >= 70) { humidityScore = 30; tags.push('💦 Very Sticky'); }
                else if (dewpt >= 64) { humidityScore = 60; tags.push('💧 Humid'); }
                else if (dewpt >= 58) { humidityScore = 85; tags.push('Noticeable'); }
                else if (dewpt <= 25 && temp < 65) { humidityScore = 70; tags.push('🌵 Very Dry'); }
            }

            let finalScore = (temp > 58) ? (thermalScore * 0.55 + humidityScore * 0.45) : thermalScore;

            if (windSpeed > 35 || windGust > 45) {
                finalScore -= 25;
                tags.push('💨 High Winds');
            } else if (windSpeed > 18) {
                if (effective < 50) { finalScore -= 12; tags.push('💨 Biting Wind'); }
                else if (effective > 82) { finalScore += 5; tags.push('🍃 Refreshing Breeze'); }
                else { finalScore -= 5; }
            } else if (windSpeed >= 4 && windSpeed <= 12 && effective >= 75 && effective <= 88) {
                finalScore += 4;
            }

            if (precipRate > 0.4) { finalScore -= 30; tags.push('⛈️ Heavy Rain'); }
            else if (precipRate > 0.05) { finalScore -= 15; tags.push('🌧️ Wet'); }
            else if (precipRate > 0) { finalScore -= 8; tags.push('💧 Drizzle'); }

            if (uv >= 9) { finalScore -= 6; tags.push('☀️ Extreme UV'); }

            finalScore = Math.max(0, Math.min(100, Math.round(finalScore)));

            let label, desc, color;
            if (finalScore >= 94) { label = 'Perfect'; desc = 'Absolute prime outdoor conditions. Exceptional air balance.'; color = '#10b981'; }
            else if (finalScore >= 85) { label = 'Excellent'; desc = 'Highly comfortable. Great for any extended outdoor activities.'; color = '#34d399'; }
            else if (finalScore >= 75) { label = 'Good'; desc = 'Generally pleasant. Slight temp offset or light moisture present.'; color = '#84cc16'; }
            else if (finalScore >= 64) { label = 'Fair'; desc = 'Passable comfort. Noticeable moisture, minor wind chill, or thermal loading.'; color = '#eab308'; }
            else if (finalScore >= 50) { label = 'Moderate'; desc = 'Suboptimal balance. Dress deliberately for the specific elements active.'; color = '#f59e0b'; }
            else if (finalScore >= 36) { label = 'Poor'; desc = 'Uncomfortable ambient environment. True conditions are quite dominant.'; color = '#f97316'; }
            else if (finalScore >= 22) { label = 'Bad'; desc = 'Highly unappealing conditions. Minimize prolonged outdoor exertion.'; color = '#ef4444'; }
            else if (finalScore >= 10) { label = 'Harsh'; desc = 'Severe sensory discomfort. Environmental pressure is high.'; color = '#dc2626'; }
            else { label = 'Dangerous'; desc = 'Extreme threat or deep systemic environmental discomfort. Stay interior.'; color = '#991b1b'; }

            let uniqueTags = [...new Set(tags)].slice(0, 3);

            return { score: finalScore, label, desc, color, tags: uniqueTags, effective };
        }

        function getWeatherCondition(data) {
            if (!data) return { icon: '❓', text: 'Unknown' };
            const temp = data.imperial?.temp;
            const humidity = data.humidity ?? 0;
            const wind = data.imperial?.windSpeed ?? 0;
            const precip = data.imperial?.precipRate ?? 0;
            const solar = data.solarRadiation ?? 0;
            const uv = data.uv ?? 0;
            const hour = new Date().getHours();
            const isNight = hour < 6 || hour >= 21;

            if (temp != null && temp <= 34 && precip > 0) return { icon: '❄️', text: 'Snow' };
            if (precip > 0.35) return { icon: '⛈️', text: 'Heavy Rain' };
            if (precip > 0.08) return { icon: '🌧️', text: 'Rain' };
            if (precip > 0) return { icon: '🌦️', text: 'Light Rain' };
            if (humidity > 94 && temp != null && temp < 52) return { icon: '🌫️', text: 'Dense Fog' };
            if (temp != null && temp <= 18) return { icon: '🥶', text: 'Frigid' };
            if (temp != null && temp <= 32) return { icon: '❄️', text: 'Freezing' };
            if (temp != null && temp >= 98) return { icon: '🔥', text: 'Intense Heat' };
            if (temp != null && temp >= 88) return { icon: '☀️', text: 'Hot' };
            if (wind > 26) return { icon: '💨', text: 'High Wind' };
            if (isNight) { return humidity < 68 ? { icon: '🌙', text: 'Clear Night' } : { icon: '☁️', text: 'Cloudy Night' }; }
            if (solar > 650 || uv > 6) return { icon: '☀️', text: 'Clear Sky' };
            if (solar > 350 || uv > 3) return { icon: '🌤️', text: 'Mostly Sunny' };
            if (solar > 120) return { icon: '⛅', text: 'Partly Cloudy' };
            return { icon: '☁️', text: 'Overcast' };
        }

        function getWindDir(degrees) {
            const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
            return dirs[Math.round(degrees / 22.5) % 16];
        }
        
        function getFullWindDir(abbr) {
            const map = {'N':'North','NNE':'North-Northeast','NE':'Northeast','ENE':'East-Northeast','E':'East','ESE':'East-Southeast','SE':'Southeast','SSE':'South-Southeast','S':'South','SSW':'South-Southwest','SW':'Southwest','WSW':'West-Southwest','W':'West','WNW':'West-Northwest','NW':'Northwest','NNW':'North-Northwest'};
            return map[abbr] || abbr;
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clockDay').textContent = now.toLocaleDateString('en-US', { weekday: 'long' }).toUpperCase();
            document.getElementById('clockTime').textContent = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
            document.getElementById('clockDate').textContent = now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
            if (sunData) updateSunTracker();
        }

        function updateSunTracker() {
            if (!sunData?.sunrise || !sunData?.sunset) return;
            const now = new Date();
            const sunrise = new Date(sunData.sunrise);
            const sunset = new Date(sunData.sunset);
            const goldenStart = new Date(sunset.getTime() - 60 * 60 * 1000);

            document.getElementById('sunriseTime').textContent = sunrise.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
            document.getElementById('sunsetTime').textContent = sunset.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
            document.getElementById('goldenTime').textContent = goldenStart.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

            const total = sunset - sunrise;
            const elapsed = now - sunrise;
            let progress = Math.max(0, Math.min(1, elapsed / total));

            const angle = Math.PI * progress;
            const x = 50 - Math.cos(angle) * 44;
            const y = 75 - Math.sin(angle) * 64;
            const sunMarker = document.getElementById('sunMarker');
            sunMarker.style.left = `${x}%`;
            sunMarker.style.bottom = `${y}px`;

            const remaining = sunset - now;
            const daylightEl = document.getElementById('daylightLeft');
            const pill = document.getElementById('goldenPill');

            if (now < sunrise) { daylightEl.textContent = 'Pre-dawn'; sunMarker.textContent = '🌙'; pill.className = 'golden-pill inactive'; pill.textContent = 'Golden Hour'; }
            else if (now > sunset) { daylightEl.textContent = 'Night'; sunMarker.textContent = '🌙'; pill.className = 'golden-pill inactive'; pill.textContent = 'Golden Hour'; }
            else {
                const h = Math.floor(remaining / 3600000);
                const m = Math.floor((remaining % 3600000) / 60000);
                daylightEl.textContent = `${h}h ${m}m`;
                sunMarker.textContent = '☀️';

                if (now >= goldenStart) {
                    const left = Math.floor((sunset - now) / 60000);
                    pill.className = 'golden-pill active';
                    pill.textContent = `🎬 ${left}m left!`;
                } else {
                    const until = Math.floor((goldenStart - now) / 60000);
                    if (until <= 120) {
                        const uh = Math.floor(until / 60);
                        const um = until % 60;
                        pill.className = 'golden-pill soon';
                        pill.textContent = uh > 0 ? `In ${uh}h ${um}m` : `In ${um}m`;
                    } else { pill.className = 'golden-pill inactive'; pill.textContent = 'Golden Hour'; }
                }
            }
        }

        // ASYNC CHICAGO CUBS TELEMETRY PARSER
        async function fetchCubsData() {
            try {
                const res = await fetch('https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/teams/chc');
                if (!res.ok) throw new Error('Cubs endpoint gateway error');
                const json = await res.json();
                const team = json.team;
                if (!team) return;

                // 1. Parse Next Game Info
                if (team.nextEvent && team.nextEvent.length > 0) {
                    const next = team.nextEvent[0];
                    const gameDate = new Date(next.date);
                    
                    // Numeric Date, Written Day of Week, Numeric Year Formatting
                    const numericDate = gameDate.toLocaleDateString('en-US', { month: '2-digit', day: '2-digit' });
                    const writtenDay = gameDate.toLocaleDateString('en-US', { weekday: 'long' });
                    const numericYear = gameDate.getFullYear();
                    
                    const timeStr = gameDate.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
                    const shortName = next.shortName ? ` (${next.shortName})` : '';

                    document.getElementById('cubsNextGame').innerHTML = `<strong>${numericDate}</strong>, ${writtenDay} <strong>${numericYear}</strong> @ ${timeStr}${shortName}`;
                } else {
                    document.getElementById('cubsNextGame').textContent = 'No upcoming games scheduled';
                }

                // 2. Parse Previous Game Final Score
                const last = team.lastEvent ? (Array.isArray(team.lastEvent) ? team.lastEvent[0] : team.lastEvent) : null;
                if (last && last.competitions && last.competitions[0]) {
                    const comp = last.competitions[0];
                    const competitors = comp.competitors || [];
                    
                    let cubsScore = null;
                    let oppScore = null;
                    let oppName = '';

                    competitors.forEach(teamObj => {
                        const isCubs = teamObj.team?.abbreviation === 'CHC' || teamObj.team?.id === '16';
                        const scoreStr = teamObj.score?.displayValue || teamObj.score || '0';
                        if (isCubs) {
                            cubsScore = parseInt(scoreStr);
                        } else {
                            oppScore = parseInt(scoreStr);
                            oppName = teamObj.team?.abbreviation || teamObj.team?.shortDisplayName || 'OPP';
                        }
                    });

                    if (cubsScore !== null && oppScore !== null) {
                        const winLossMark = cubsScore > oppScore ? '🟢 W' : (cubsScore < oppScore ? '🔴 L' : '⚪ T');
                        document.getElementById('cubsPrevGame').textContent = `CHC ${cubsScore} - ${oppScore} ${oppName} (${winLossMark})`;
                    } else {
                        document.getElementById('cubsPrevGame').textContent = 'Score calculations incomplete';
                    }
                } else {
                    document.getElementById('cubsPrevGame').textContent = 'Historical scoreboard log empty';
                }

                document.getElementById('cubsCard').style.display = 'block';
            } catch (err) {
                console.warn('Cubs telemetry stream timed out:', err);
            }
        }

        async function fetchStation(stationId) {
            const url = `https://api.weather.com/v2/pws/observations/current?stationId=${stationId}&format=json&units=e&apiKey=${API_KEY}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const json = await res.json();
            return json.observations?.[0] || null;
        }

        async function fetchForecast(lat, lon) {
            const url = `https://api.weather.com/v3/wx/forecast/daily/5day?geocode=${lat},${lon}&format=json&units=e&language=en-US&apiKey=${API_KEY}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return await res.json();
        }

        function renderStation(config, data, forecast) {
            if (!data) {
                return `<div class="station"><div class="station-header"><div><div class="station-name">${config.name}</div><div class="station-location">${config.location}</div></div><span class="station-status offline">● Offline</span></div><div class="error-state" style="margin: 24px;">Station gateway telemetry timeout</div></div>`;
            }

            const temp = data.imperial?.temp ?? '--';
            const humidity = data.humidity ?? '--';
            const dewpt = data.imperial?.dewpt ?? '--';
            const windSpeed = data.imperial?.windSpeed ?? 0;
            const windDir = data.winddir ?? 0;
            const windGust = data.imperial?.windGust ?? 0;
            const pressure = data.imperial?.pressure ?? '--';
            const precipTotal = data.imperial?.precipTotal ?? 0;
            const uv = data.uv;
            const solar = data.solarRadiation;

            const lightningCount = data.lightningStrikeCount ?? 
                                   data.lightningCount ?? 
                                   data.lightning ?? 
                                   data.lightning_day ?? 
                                   data.lightningDay ?? 
                                   data.imperial?.lightningCount ?? 0;

            const windChill = data.imperial?.windChill;
            const heatIndex = data.imperial?.heatIndex;
            let feelsLike = temp;
            if (temp !== '--') {
                if (temp <= 52 && windChill != null) feelsLike = windChill;
                else if (temp >= 78 && heatIndex != null) feelsLike = heatIndex;
            }

            const windDirAbbr = getWindDir(windDir);
            const windDirFull = getFullWindDir(windDirAbbr);
            const condition = getWeatherCondition(data);
            const comfort = calculateComfortIndex(data);

            const circumference = 2 * Math.PI * 72;
            const offset = circumference - (comfort.score / 100) * circumference;

            let forecastHtml = '';
            if (forecast?.daypart?.[0]) {
                const dp = forecast.daypart[0];
                let startIdx = dp.temperature?.[0] === null ? 1 : 0;
                for (let i = startIdx; i < Math.min(startIdx + 3, dp.daypartName?.length ?? 0); i++) {
                    if (dp.temperature?.[i] === null) continue;
                    forecastHtml += `<div class="forecast-item"><div class="forecast-period">${dp.daypartName[i]}</div><div class="forecast-narrative">${dp.narrative?.[i] || 'Forecast narrative unavailable'}</div></div>`;
                }
            }
            if (!forecastHtml) forecastHtml = '<div class="forecast-item"><div class="forecast-narrative">Extended outlook unavailable</div></div>';

            const uid = config.id;

            let dataCells = `
                <div class="data-cell"><div class="data-icon">💧</div><div class="data-label">Humidity</div><div class="data-value">${humidity}<span class="unit">%</span></div></div>
                <div class="data-cell"><div class="data-icon">🌡️</div><div class="data-label">Dew Point</div><div class="data-value">${Math.round(dewpt)}<span class="unit">°</span></div></div>
                <div class="data-cell"><div class="data-icon">📊</div><div class="data-label">Pressure</div><div class="data-value">${pressure.toFixed(2)}<span class="unit">"</span></div></div>
                <div class="data-cell"><div class="data-icon">🌧️</div><div class="data-label">Rain Today</div><div class="data-value">${precipTotal.toFixed(2)}<span class="unit">"</span></div></div>`;

            if (config.hasSolar) {
                dataCells += `<div class="data-cell"><div class="data-icon">☀️</div><div class="data-label">UV Index</div><div class="data-value">${uv ?? 0}</div></div>`;
                dataCells += `<div class="data-cell"><div class="data-icon">⚡</div><div class="data-label">Solar</div><div class="data-value">${solar ?? 0}<span class="unit">w</span></div></div>`;
            }

            let lightningHtml = '';
            if (config.hasLightning) {
                const isActive = lightningCount > 0;
                lightningHtml = `
                    <div class="lightning-section ${isActive ? 'active-strikes' : ''}">
                        <div class="lightning-icon-wrap">⚡</div>
                        <div class="lightning-info">
                            <h4>Lightning Tracker</h4>
                            <div class="lightning-count">${lightningCount}<span class="period">strikes today</span></div>
                        </div>
                    </div>`;
            }

            return `
                <div class="station">
                    <div class="station-header"><div><div class="station-name">${config.name}</div><div class="station-location">${config.location}</div></div><span class="station-status">● Live</span></div>
                    
                    <div class="comfort-section">
                        <div class="comfort-ring-wrap">
                            <svg class="comfort-ring-svg" viewBox="0 0 160 160">
                                <circle class="comfort-ring-bg" cx="80" cy="80" r="72"/>
                                <circle class="comfort-ring-fill" cx="80" cy="80" r="72" stroke="${comfort.color}" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" style="filter: drop-shadow(0 0 8px ${comfort.color}40);"/>
                            </svg>
                            <div class="comfort-center">
                                <div class="comfort-value" style="color: ${comfort.color}">${comfort.score}</div>
                                <div class="comfort-label" style="color: ${comfort.color}">${comfort.label}</div>
                            </div>
                        </div>
                        <div class="comfort-desc">${comfort.desc}</div>
                        ${comfort.tags.length > 0 ? `<div class="comfort-tags">${comfort.tags.map(t => `<span class="comfort-tag">${t}</span>`).join('')}</div>` : ''}
                    </div>

                    <div class="temp-section">
                        <div class="temp-main">
                            <div class="temp-value">${Math.round(temp)}<span class="deg">°F</span></div>
                            ${Math.round(feelsLike) !== Math.round(temp) ? `<div class="temp-feels">Feels like <strong>${Math.round(feelsLike)}°</strong></div>` : ''}
                        </div>
                        <div class="condition-chip"><div class="condition-icon">${condition.icon}</div><div class="condition-text">${condition.text}</div></div>
                    </div>

                    <div class="wind-section">
                        <div class="compass-container">
                            <div class="compass-ring"></div>
                            <div class="compass-dirs"><span class="n">N</span><span class="e">E</span><span class="s">S</span><span class="w">W</span></div>
                            <div class="compass-needle" style="transform: translate(-50%, -100%) rotate(${windDir}deg);"></div>
                            <div class="compass-center-dot"></div>
                        </div>
                        <div class="wind-info">
                            <div class="wind-speed">${Math.round(windSpeed)}<span class="unit">mph</span></div>
                            <div class="wind-direction-text">From the ${windDirFull} (${windDir}°)</div>
                            ${windGust > windSpeed ? `<div class="wind-gust-alert">⚠️ Gusts to ${Math.round(windGust)} mph</div>` : ''}
                        </div>
                    </div>

                    <div class="data-grid">${dataCells}</div>
                    ${lightningHtml}
                    
                    <button class="forecast-toggle" onclick="toggleForecast('${uid}')" id="btn-${uid}">
                        📋 Extended Outlook
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
                    </button>
                    <div class="forecast-content" id="forecast-${uid}">${forecastHtml}</div>
                </div>`;
        }

        function toggleForecast(id) {
            document.getElementById(`forecast-${id}`).classList.toggle('open');
            document.getElementById(`btn-${id}`).classList.toggle('open');
        }

        async function refresh() {
            const btn = document.getElementById('refreshBtn');
            const content = document.getElementById('content');
            btn.classList.add('spinning');

            // Trigger sports telemetry update asynchronously alongside weather updates
            fetchCubsData();

            let html = '';
            for (const station of STATIONS) {
                try {
                    const data = await fetchStation(station.id);
                    let forecast = null;
                    if (data?.lat && data?.lon) {
                        try {
                            forecast = await fetchForecast(data.lat, data.lon);
                            if (!sunData && forecast) {
                                sunData = { sunrise: forecast.sunriseTimeLocal?.[0], sunset: forecast.sunsetTimeLocal?.[0] };
                                document.getElementById('sunCard').style.display = 'block';
                                updateSunTracker();
                            }
                        } catch (e) { console.warn('Forecast array mismatch:', e); }
                    }
                    html += renderStation(station, data, forecast);
                } catch (err) {
                    console.error(`Telemetry error on ${station.id}:`, err);
                    html += renderStation(station, null, null);
                }
            }

            content.innerHTML = html;
            countdown = 60;
            btn.classList.remove('spinning');
        }

        function tick() {
            countdown--;
            if (countdown <= 0) { refresh(); countdown = 60; }
            document.getElementById('countdown').textContent = `${countdown}s`;
            updateClock();
        }

        document.addEventListener('DOMContentLoaded', () => { 
            updateClock(); 
            refresh(); 
            setInterval(tick, 1000); 
        });
        
        if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(() => {});
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});
    </script>
