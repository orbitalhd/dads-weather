<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Franklin Weather">
    <link rel="apple-touch-icon" href="./icons/icon-192.png">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#080c14">
    <link rel="manifest" href="./manifest.json">

    <title>Franklin TN Real-Time Weather</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-base: #080c14;
            --bg-card: #0f1521;
            --bg-elevated: #161d2d;
            --border-subtle: rgba(255,255,255,0.06);
            --border-medium: rgba(255,255,255,0.1);
            --text-primary: #f8fafc;
            --text-secondary: rgba(248,250,252,0.7);
            --text-muted: rgba(248,250,252,0.4);
            --accent-cyan: #22d3ee;
            --accent-emerald: #34d399;
            --accent-amber: #fbbf24;
            --accent-orange: #fb923c;
            --accent-rose: #fb7185;
            --accent-purple: #a78bfa;
            --accent-blue: #60a5fa;
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { height: 100%; -webkit-font-smoothing: antialiased; }
        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
            min-height: 100%;
            padding: 16px;
            padding-top: max(16px, env(safe-area-inset-top));
            padding-bottom: max(90px, calc(env(safe-area-inset-bottom) + 90px));
            line-height: 1.5;
        }
        .container { max-width: 480px; margin: 0 auto; }

        /* Accessible focus rings - restored after the tap-highlight reset above */
        button:focus-visible,
        a:focus-visible { outline: 2px solid var(--accent-blue); outline-offset: 3px; border-radius: 4px; }

        /* Visually-hidden but screen-reader available */
        .sr-only {
            position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
            overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
        }

        /* Header */
        .header { text-align: center; padding: 8px 0 24px; }
        .clock { margin-bottom: 16px; }
        .clock-day { font-size: 11px; font-weight: 600; letter-spacing: 4px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
        .clock-time { font-family: 'Space Grotesk', monospace; font-size: 48px; font-weight: 700; letter-spacing: -2px; background: linear-gradient(180deg, var(--text-primary) 0%, rgba(248,250,252,0.6) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .clock-date { font-size: 14px; color: var(--text-secondary); margin-top: 2px; }
        .brand { display: inline-flex; align-items: center; gap: 10px; padding: 10px 18px; background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 100px; }
        .brand-icon { font-size: 20px; }
        .brand-text { font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: -0.3px; }
        .status-live { display: inline-flex; align-items: center; gap: 6px; margin-top: 12px; font-size: 11px; font-weight: 600; color: var(--accent-emerald); text-transform: uppercase; letter-spacing: 1px; }
        .status-dot { width: 6px; height: 6px; background: var(--accent-emerald); border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* Station cards */
        .station { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-xl); margin-bottom: 20px; overflow: hidden; }
        .station-header { display: flex; justify-content: space-between; align-items: flex-start; padding: 20px 20px 0; }
        .station-name { font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 2px; }
        .station-location { font-size: 12px; color: var(--text-muted); }
        .station-status { display: flex; align-items: center; gap: 5px; padding: 5px 10px; background: rgba(52, 211, 153, 0.1); border-radius: 100px; font-size: 10px; font-weight: 700; color: var(--accent-emerald); text-transform: uppercase; letter-spacing: 0.5px; }
        .station-status.offline { background: rgba(251, 113, 133, 0.1); color: var(--accent-rose); }

        /* Loading */
        .station-loading { padding: 40px 20px; text-align: center; color: var(--text-secondary); }

        /* Comfort ring */
        .comfort-section { padding: 8px 20px 24px; text-align: center; }
        .comfort-ring-wrap { position: relative; width: 180px; height: 180px; margin: 0 auto 20px; }
        .comfort-ring-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
        .comfort-ring-bg { fill: none; stroke: var(--bg-elevated); stroke-width: 14; }
        .comfort-ring-fill { fill: none; stroke-width: 14; stroke-linecap: round; transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.5s ease; }
        .comfort-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        .comfort-value { font-family: 'Space Grotesk', monospace; font-size: 56px; font-weight: 700; line-height: 1; letter-spacing: -2px; }
        .comfort-label { font-size: 16px; font-weight: 700; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
        .comfort-desc { font-size: 15px; color: var(--text-secondary); max-width: 300px; margin: 0 auto 16px; line-height: 1.5; }
        .comfort-tags { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; min-height: 28px; }
        .comfort-tag { display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px; background: var(--bg-elevated); border-radius: 100px; font-size: 12px; font-weight: 500; color: var(--text-secondary); }

        /* Temperature */
        .temp-section { display: flex; align-items: center; justify-content: center; gap: 20px; padding: 28px 20px 16px; }
        .temp-main { text-align: center; }
        .temp-value { font-family: 'Space Grotesk', monospace; font-size: 80px; font-weight: 700; line-height: 0.9; letter-spacing: -4px; }
        .temp-value .deg { font-size: 32px; font-weight: 500; opacity: 0.5; vertical-align: top; margin-left: -8px; }
        .temp-feels { font-size: 14px; color: var(--text-secondary); margin-top: 4px; min-height: 1.2em; }
        .temp-feels strong { color: var(--text-primary); font-weight: 600; }
        .condition-chip { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 16px 20px; background: var(--bg-elevated); border-radius: var(--radius-md); }
        .condition-icon { font-size: 32px; }
        .condition-text { font-size: 13px; font-weight: 600; color: var(--text-secondary); }

        /* Compass */
        .wind-section { display: flex; align-items: center; gap: 20px; padding: 0 20px 20px; }
        .compass-container { position: relative; width: 100px; height: 100px; flex-shrink: 0; }
        .compass-ring { position: absolute; inset: 0; border: 2px solid var(--border-medium); border-radius: 50%; background: var(--bg-elevated); }
        .compass-dirs { position: absolute; inset: 8px; font-size: 10px; font-weight: 700; color: var(--text-muted); }
        .compass-dirs span { position: absolute; }
        .compass-dirs .n { top: 2px; left: 50%; transform: translateX(-50%); color: var(--text-primary); }
        .compass-dirs .s { bottom: 2px; left: 50%; transform: translateX(-50%); }
        .compass-dirs .e { right: 2px; top: 50%; transform: translateY(-50%); }
        .compass-dirs .w { left: 2px; top: 50%; transform: translateY(-50%); }
        .compass-needle { position: absolute; top: 50%; left: 50%; width: 4px; height: 38px; transform-origin: bottom center; transform: translate(-50%, -100%) rotate(0deg); transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .compass-needle::before { content: ''; position: absolute; top: 0; left: -5px; border-left: 7px solid transparent; border-right: 7px solid transparent; border-bottom: 22px solid var(--accent-cyan); filter: drop-shadow(0 0 8px var(--accent-cyan)); }
        .compass-center-dot { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 12px; height: 12px; background: var(--text-primary); border-radius: 50%; box-shadow: 0 0 0 3px var(--bg-elevated); }
        .wind-info { flex: 1; }
        .wind-speed { font-family: 'Space Grotesk', monospace; font-size: 40px; font-weight: 700; line-height: 1; letter-spacing: -1px; }
        .wind-speed .unit { font-size: 16px; font-weight: 500; color: var(--text-secondary); margin-left: 4px; }
        .wind-direction-text { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }
        .wind-gust-alert { display: inline-flex; align-items: center; gap: 6px; margin-top: 10px; padding: 6px 12px; background: rgba(251, 146, 60, 0.15); border-radius: 100px; font-size: 13px; font-weight: 600; color: var(--accent-orange); }
        .wind-gust-alert.hidden { display: none; }

        /* Data grid */
        .data-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border-subtle); border-top: 1px solid var(--border-subtle); }
        .data-cell { background: var(--bg-card); padding: 18px 12px; text-align: center; }
        .data-icon { font-size: 22px; margin-bottom: 8px; }
        .data-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 4px; }
        .data-value { font-family: 'Space Grotesk', monospace; font-size: 20px; font-weight: 700; }
        .data-value .unit { font-size: 12px; font-weight: 500; color: var(--text-secondary); }

        /* Lightning */
        .lightning-section { display: flex; align-items: center; gap: 16px; padding: 18px 20px; background: linear-gradient(135deg, rgba(167, 139, 250, 0.1) 0%, rgba(139, 92, 246, 0.05) 100%); border-top: 1px solid var(--border-subtle); }
        .lightning-icon-wrap { width: 52px; height: 52px; background: linear-gradient(135deg, #a78bfa 0%, #8b5cf6 100%); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 26px; box-shadow: 0 0 30px -8px rgba(167, 139, 250, 0.5); }
        .lightning-info h4 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 2px; }
        .lightning-count { font-family: 'Space Grotesk', monospace; font-size: 28px; font-weight: 700; color: var(--accent-purple); }
        .lightning-count .period { font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-left: 4px; }

        /* Forecast dropdown */
        .forecast-toggle {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; padding: 14px 20px;
            background: var(--bg-elevated);
            border: none; border-top: 1px solid var(--border-subtle);
            color: var(--text-primary);
            font-family: 'DM Sans', inherit; font-size: 13px; font-weight: 600;
            cursor: pointer; text-align: left;
            transition: background 0.2s;
        }
        .forecast-toggle:hover { background: rgba(255,255,255,0.03); }
        .forecast-toggle:active { background: rgba(255,255,255,0.05); }
        .forecast-toggle-label { display: flex; align-items: center; gap: 8px; }
        .forecast-chevron {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--text-muted); flex-shrink: 0;
        }
        .forecast-toggle[aria-expanded="true"] .forecast-chevron { transform: rotate(180deg); }
        .forecast-toggle[aria-expanded="true"] { background: rgba(96, 165, 250, 0.05); }
        .forecast-content {
            max-height: 0; overflow: hidden;
            transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--bg-base);
            border-top: 1px solid transparent;
        }
        .forecast-content.expanded {
            max-height: 200px;
            border-top-color: var(--border-subtle);
        }
        .forecast-scroll {
            display: flex; gap: 10px; padding: 16px 16px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }
        .forecast-scroll::-webkit-scrollbar { height: 4px; }
        .forecast-scroll::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 2px; }
        .forecast-hour {
            flex-shrink: 0; min-width: 68px; padding: 12px 8px 10px;
            background: var(--bg-card); border-radius: var(--radius-sm);
            border: 1px solid var(--border-subtle); text-align: center;
            scroll-snap-align: start;
            display: flex; flex-direction: column; align-items: center;
        }
        .forecast-hour.is-now { border-color: rgba(96, 165, 250, 0.4); background: rgba(96, 165, 250, 0.06); }
        .forecast-time { font-size: 10px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        .forecast-hour.is-now .forecast-time { color: var(--accent-blue); }
        .forecast-icon { font-size: 22px; line-height: 1; margin-bottom: 6px; }
        .forecast-temp { font-family: 'Space Grotesk', monospace; font-size: 18px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
        .forecast-pop { font-size: 10px; color: var(--accent-blue); font-weight: 600; min-height: 12px; }
        .forecast-pop.dim { color: var(--text-muted); opacity: 0.4; }
        .forecast-empty { padding: 24px 20px; text-align: center; font-size: 13px; color: var(--text-muted); }

        /* Cubs card */
        .sports-card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-xl); padding: 20px; margin-bottom: 20px; box-shadow: 0 12px 40px -12px rgba(0,0,0,0.5); }
        .sports-card.hidden { display: none; }
        .sports-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; gap: 12px; }
        .sports-title { font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .sports-pill { padding: 4px 10px; border-radius: 100px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; border: 1px solid rgba(96, 165, 250, 0.2); background: rgba(96, 165, 250, 0.08); color: var(--accent-blue); text-align: right; flex-shrink: 0; }
        .sports-pill.live { border-color: rgba(251, 113, 133, 0.35); background: rgba(251, 113, 133, 0.12); color: var(--accent-rose); animation: pulse 1.4s ease-in-out infinite; }

        /* Stacked game blocks: NEXT GAME + LAST GAME */
        .game-block { background: var(--bg-base); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 12px 14px; margin-bottom: 10px; }
        .game-block:last-child { margin-bottom: 0; }
        .game-block.empty { opacity: 0.55; }
        .game-block-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 6px; }
        .game-block-row { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }
        .game-matchup { font-family: 'Space Grotesk', sans-serif; font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
        .game-meta { font-size: 12px; color: var(--text-secondary); font-weight: 500; text-align: right; flex-shrink: 0; }
        .game-meta .strong { color: var(--text-primary); font-weight: 700; }
        .game-live-detail { font-size: 12px; color: var(--accent-rose); font-weight: 600; }

        /* Sun tracker */
        .sun-card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-xl); padding: 20px; margin-bottom: 20px; }
        .sun-card.hidden { display: none; }
        .sun-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 12px; }
        .sun-title { font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .session-label { font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: lowercase; letter-spacing: 0.3px; margin-left: 4px; }
        .golden-pill { padding: 5px 12px; border-radius: 100px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; border: 1px solid transparent; flex-shrink: 0; }
        .golden-pill.active { background: linear-gradient(135deg, rgba(251, 191, 36, 0.2) 0%, rgba(245, 158, 11, 0.2) 100%); color: var(--accent-amber); }
        .golden-pill.soon { background: rgba(96, 165, 250, 0.1); border-color: rgba(96, 165, 250, 0.15); color: var(--accent-blue); }
        .golden-pill.inactive { background: var(--bg-elevated); color: var(--text-muted); border-color: var(--border-subtle); }

        .sun-arc-wrap { position: relative; height: 90px; margin-bottom: 16px; }
        .sun-arc { position: absolute; bottom: 0; left: 8%; width: 84%; height: 75px; border: 2px dashed rgba(255,255,255,0.08); border-bottom: none; border-radius: 200px 200px 0 0; }
        .sun-marker { position: absolute; width: 32px; height: 32px; background: var(--accent-amber); border-radius: 50%; transform: translate(-50%, 50%); display: flex; align-items: center; justify-content: center; font-size: 16px; box-shadow: 0 0 24px var(--accent-amber); transition: left 0.5s ease, bottom 0.5s ease; z-index: 10; }
        .sun-horizon { position: absolute; bottom: 0; left: 4%; width: 92%; height: 2px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent); }
        .sun-times-row { display: flex; justify-content: space-between; padding: 0 4%; font-size: 12px; color: var(--text-muted); margin-bottom: 20px; }

        .sky-phases-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .sky-phase-box { background: var(--bg-elevated); padding: 12px 8px; border-radius: var(--radius-sm); border: 1px solid var(--border-subtle); text-align: center; transition: all 0.3s ease; }
        .sky-phase-box.active { border-color: currentColor; background: rgba(255,255,255,0.01); box-shadow: inset 0 0 12px rgba(255,255,255,0.02); }
        .phase-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 2px; }
        .sky-phase-box.active .phase-label { color: var(--text-primary); }
        .phase-window { font-family: 'Space Grotesk', monospace; font-size: 11px; font-weight: 700; color: var(--text-secondary); letter-spacing: -0.3px; white-space: nowrap; }
        .sky-phase-box.active .phase-window { color: inherit; }

        /* Footer / refresh */
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 24px; padding-bottom: max(12px, env(safe-area-inset-bottom)); background: linear-gradient(to top, var(--bg-base) 70%, transparent); display: flex; justify-content: center; align-items: center; gap: 20px; z-index: 1000; }
        .countdown-text { font-family: 'Space Grotesk', monospace; font-size: 14px; font-weight: 600; color: var(--text-muted); min-width: 40px; text-align: center; }
        .refresh-btn { width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%); border: none; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 8px 32px -8px rgba(96, 165, 250, 0.5); transition: transform 0.2s, box-shadow 0.2s; }
        .refresh-btn:active { transform: scale(0.92); }
        .refresh-btn[aria-busy="true"] svg { animation: spin 0.7s linear infinite; }
        .refresh-btn[disabled] { opacity: 0.6; cursor: wait; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-state { text-align: center; padding: 60px 20px; }
        .loading-spinner { width: 48px; height: 48px; border: 3px solid var(--bg-elevated); border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
        .loading-text { font-size: 14px; color: var(--text-secondary); }

        /* Respect reduced-motion preference */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
            }
            .sun-marker { transition: none; }
            .comfort-ring-fill { transition: none; }
            .compass-needle { transition: none; }
            .status-dot, .sports-pill.live { animation: none; }
            .forecast-chevron, .forecast-content { transition: none !important; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="clock">
                <div class="clock-day" id="clockDay">---</div>
                <div class="clock-time" id="clockTime" aria-live="off">--:--</div>
                <div class="clock-date" id="clockDate">---</div>
            </div>
            <div class="brand">
                <span class="brand-icon" aria-hidden="true">☀️</span>
                <span class="brand-text">Franklin TN Real-Time Weather</span>
            </div>
            <div class="status-live" role="status">
                <span class="status-dot" aria-hidden="true"></span>
                Direct Hardware Link
            </div>
        </header>

        <main id="content" aria-live="polite">
            <div class="loading-state" id="initialLoading">
                <div class="loading-spinner" aria-hidden="true"></div>
                <div class="loading-text">Polling Ambient Devices...</div>
            </div>
        </main>

        <section class="sports-card hidden" id="cubsCard" aria-label="Chicago Cubs next game">
            <div class="sports-header">
                <span class="sports-title"><span aria-hidden="true">🐻</span> Chicago Cubs</span>
                <span class="sports-pill" id="cubsHeaderPill" hidden></span>
            </div>

            <div class="game-block" id="nextGameBlock">
                <div class="game-block-label">Next Game</div>
                <div class="game-block-row">
                    <span class="game-matchup" id="nextMatchup">—</span>
                    <span class="game-meta" id="nextMeta">—</span>
                </div>
            </div>
        </section>

        <section class="sun-card hidden" id="sunCard" aria-label="Sun position and golden hour tracker">
            <div class="sun-header">
                <span class="sun-title"><span aria-hidden="true">✨</span> Celestial Horizon Tracker <span class="session-label" id="sessionLabel"></span></span>
                <span class="golden-pill inactive" id="goldenPill">Daylight</span>
            </div>
            <div class="sun-arc-wrap">
                <div class="sun-arc" aria-hidden="true"></div>
                <div class="sun-marker" id="sunMarker" aria-hidden="true">☀️</div>
                <div class="sun-horizon" aria-hidden="true"></div>
            </div>
            <div class="sun-times-row">
                <span id="sunriseTime">--:--</span>
                <span id="sunsetTime">--:--</span>
            </div>

            <div class="sky-phases-grid">
                <div class="sky-phase-box" id="phaseGolden" style="color: var(--accent-amber);">
                    <div class="phase-label">Golden Hour</div>
                    <div class="phase-window" id="winGolden">--:-- – --:--</div>
                </div>
                <div class="sky-phase-box" id="phaseBlue" style="color: var(--accent-blue);">
                    <div class="phase-label">Blue Moment</div>
                    <div class="phase-window" id="winBlue">--:-- – --:--</div>
                </div>
                <div class="sky-phase-box" id="phaseSailing" style="color: var(--accent-purple);">
                    <div class="phase-label">Sailing Time</div>
                    <div class="phase-window" id="winSailing">--:-- – --:--</div>
                </div>
            </div>
        </section>
    </div>

    <div class="bottom-bar">
        <span class="countdown-text" id="countdown" aria-label="Seconds until next refresh">60s</span>
        <button class="refresh-btn" id="refreshBtn" type="button" aria-label="Refresh now" aria-busy="false">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 12a9 9 0 11-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
                <path d="M21 3v5h-5"/>
            </svg>
        </button>
        <span class="countdown-text" style="opacity: 0;" aria-hidden="true">60s</span>
    </div>

    <span class="sr-only" id="srStatus" aria-live="polite"></span>

    <script>
    'use strict';

    // ====================================================================
    // CONFIG  -  All magic numbers live here. Easier to tune in the field.
    // ====================================================================
    const CONFIG = {
        // Poll cadence
        POLL_INTERVAL_SECONDS: 60,
        TICK_MS: 1000,

        // Endpoints
        AMBIENT_PROXY_URL: '/api/ambient',
        SUN_API_URL: 'https://api.open-meteo.com/v1/forecast?latitude=35.9251&longitude=-86.8689&daily=sunrise,sunset&timezone=America%2FChicago',
        FORECAST_API_URL: 'https://api.open-meteo.com/v1/forecast?latitude=35.9251&longitude=-86.8689' +
            '&hourly=temperature_2m,precipitation_probability,weather_code,is_day' +
            '&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch' +
            '&timezone=America%2FChicago&forecast_days=2',
        ESPN_CUBS_URL: 'https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/teams/chc',
        ESPN_CUBS_SCHEDULE_URL: 'https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/teams/chc/schedule',

        // Stations - order matters: used as positional fallback when name-match fails
        STATIONS: [
            { id: 'battlefield', name: 'Battlefield Park', location: 'Columbia Ave & Battle Ave', hasSolar: true,  hasLightning: true  },
            { id: 'heath',       name: 'Heath Place',      location: 'Off Carnton Lane',          hasSolar: false, hasLightning: false }
        ],

        // Comfort algorithm thresholds (°F unless noted)
        COMFORT: {
            DEWPT_OPPRESSIVE: 74,
            DEWPT_HUMID:      66,
            DEWPT_NOTICEABLE: 60,
            WIND_BREEZY_MPH:  22,
            UV_HIGH:           8,
            PRECIP_LIGHT_IN:  0.1,
            PRECIP_HEAVY_IN:  0.2
        },

        // Sun phase durations (minutes either side of sunset)
        SUN: {
            GOLDEN_BEFORE_SUNSET_MIN: 60,
            BLUE_AFTER_SUNSET_MIN:    30,
            SAILING_AFTER_SUNSET_MIN: 60
        }
    };

    // ====================================================================
    // STATE  -  Persists across renders. Avoids full innerHTML replacement.
    // ====================================================================
    const state = {
        sunData: null,             // { sunrise: ISOstring, sunset: ISOstring }
        forecastData: null,        // 10-hour rolled forecast (shared across stations)
        countdown: CONFIG.POLL_INTERVAL_SECONDS,
        refreshInFlight: false,
        stationElements: new Map() // id -> root DOM element for that station
    };

    // ====================================================================
    // UTILITY HELPERS
    // ====================================================================
    const fmtClockTime = (d) => d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
    const fmtPhaseTime = (d) => d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
    const fmtPhaseRange = (start, end) => `${fmtPhaseTime(start)} – ${fmtPhaseTime(end)}`;

    const safeNum = (val) => (typeof val === 'number' && !isNaN(val)) ? val : null;

    const WIND_ABBRS = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
    const WIND_FULL = {
        N:'North', NNE:'North-Northeast', NE:'Northeast', ENE:'East-Northeast',
        E:'East',  ESE:'East-Southeast',  SE:'Southeast',  SSE:'South-Southeast',
        S:'South', SSW:'South-Southwest', SW:'Southwest',  WSW:'West-Southwest',
        W:'West',  WNW:'West-Northwest',  NW:'Northwest',  NNW:'North-Northwest'
    };
    const getWindDirAbbr = (deg) => WIND_ABBRS[Math.round(deg / 22.5) % 16];
    const getWindDirFull = (abbr) => WIND_FULL[abbr] || abbr;

    // ====================================================================
    // COMFORT INDEX
    // ====================================================================
    function calculateComfort(temp, dewpt, windSpeed, uv, precipRate) {
        if (temp === null) {
            return { score: 0, label: 'Unknown', desc: 'Hardware arrays offline', color: '#666', tags: [] };
        }

        const T = CONFIG.COMFORT;
        let score = 100;
        const tags = [];

        // Temperature band
        if      (temp <= 32) { score -= 50; tags.push('❄️ Freezing'); }
        else if (temp <= 50) { score -= 25; tags.push('Chilly'); }
        else if (temp <= 60) { score -= 10; tags.push('Mild'); }
        else if (temp <= 75) { score +=  5; tags.push('👌 Ideal'); }
        else if (temp <= 80) { score -=  5; tags.push('Warm'); }
        else if (temp <= 88) { score -= 18; tags.push('🌡️ Hot'); }
        else if (temp <= 94) { score -= 35; tags.push('🔥 Very Hot'); }
        else                 { score -= 60; tags.push('🥵 Severe Heat'); }

        // Humidity penalty (only matters when warm enough to feel it)
        if (dewpt !== null && temp > 55) {
            if      (dewpt >= T.DEWPT_OPPRESSIVE) { score -= 24; tags.push('💦 Oppressive'); }
            else if (dewpt >= T.DEWPT_HUMID)      { score -= 14; tags.push('💧 Humid'); }
            else if (dewpt >= T.DEWPT_NOTICEABLE) { score -=  6; tags.push('Noticeable'); }
        }

        if (windSpeed > T.WIND_BREEZY_MPH) { score -= 12; tags.push('💨 Windy'); }
        if (uv >= T.UV_HIGH)               { score -= 10; tags.push('☀️ High UV'); }
        if (precipRate > T.PRECIP_LIGHT_IN) { score -= 25; tags.push('🌧️ Rain'); }

        score = Math.max(0, Math.min(100, Math.round(score)));

        let label, desc, color;
        if      (score >= 92) { label = 'Perfect';   desc = 'Exceptional outdoor conditions.';         color = '#10b981'; }
        else if (score >= 80) { label = 'Excellent'; desc = 'Great day to be outside.';                color = '#34d399'; }
        else if (score >= 66) { label = 'Good';      desc = 'Pleasant conditions overall.';            color = '#84cc16'; }
        else if (score >= 50) { label = 'Fair';      desc = 'Passable balance. Note specific elements.'; color = '#eab308'; }
        else if (score >= 35) { label = 'Moderate';  desc = 'Suboptimal balance. Dress deliberately.';   color = '#f59e0b'; }
        else                  { label = 'Poor';      desc = 'Uncomfortable ambient environment.';        color = '#fb7185'; }

        return { score, label, desc, color, tags: tags.slice(0, 3) };
    }

    function inferCondition(temp, precip, solar, uv) {
        const hour = new Date().getHours();
        const isNight = hour < 6 || hour >= 21;
        if (precip > CONFIG.COMFORT.PRECIP_HEAVY_IN) return { icon: '⛈️', text: 'Heavy Rain' };
        if (precip > 0)                              return { icon: '🌧️', text: 'Rain' };
        if (temp !== null && temp <= 32)             return { icon: '❄️', text: 'Freezing' };
        if (isNight)                                 return { icon: '🌙', text: 'Clear Night' };
        if (solar > 400 || uv > 4)                   return { icon: '☀️', text: 'Sunny' };
        return { icon: '☁️', text: 'Cloudy' };
    }

    // ====================================================================
    // CLOCK
    // ====================================================================
    function updateClock() {
        const now = new Date();
        document.getElementById('clockDay').textContent = now.toLocaleDateString('en-US', { weekday: 'long' }).toUpperCase();
        document.getElementById('clockTime').textContent = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
        document.getElementById('clockDate').textContent = now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
        if (state.sunData) updateSunTracker();
    }

    // ====================================================================
    // SUN TRACKER
    // ====================================================================
    // Phases happen TWICE per day: a morning session (around sunrise) and
    // an evening session (around sunset). We pick whichever is "current
    // or next" based on the time of day, so the display tracks what the
    // viewer is about to experience or is in the middle of.
    function computePhaseSession(sunrise, sunset, now) {
        const goldenMin  = CONFIG.SUN.GOLDEN_BEFORE_SUNSET_MIN;
        const blueMin    = CONFIG.SUN.BLUE_AFTER_SUNSET_MIN;
        const sailingMin = CONFIG.SUN.SAILING_AFTER_SUNSET_MIN;

        // Use morning session up until morning golden hour ends.
        // After that, switch to evening session (which includes daytime
        // when evening phases are still upcoming).
        const morningGoldenEnd = new Date(sunrise.getTime() + goldenMin * 60_000);
        const isMorning = now < morningGoldenEnd;

        if (isMorning) {
            // Morning sequence, chronologically:
            //   sailing (deep predawn) → blue (predawn) → golden (post-sunrise)
            return {
                session: 'morning',
                anchor:        sunrise,
                sailingStart:  new Date(sunrise.getTime() - sailingMin * 60_000),
                sailingEnd:    new Date(sunrise.getTime() - blueMin    * 60_000),
                blueStart:     new Date(sunrise.getTime() - blueMin    * 60_000),
                blueEnd:       sunrise,
                goldenStart:   sunrise,
                goldenEnd:     new Date(sunrise.getTime() + goldenMin  * 60_000)
            };
        } else {
            // Evening sequence, chronologically:
            //   golden (pre-sunset) → blue (post-sunset) → sailing (deep dusk)
            return {
                session: 'evening',
                anchor:        sunset,
                goldenStart:   new Date(sunset.getTime() - goldenMin  * 60_000),
                goldenEnd:     sunset,
                blueStart:     sunset,
                blueEnd:       new Date(sunset.getTime() + blueMin    * 60_000),
                sailingStart:  new Date(sunset.getTime() + blueMin    * 60_000),
                sailingEnd:    new Date(sunset.getTime() + sailingMin * 60_000)
            };
        }
    }

    function updateSunTracker() {
        if (!state.sunData?.sunrise || !state.sunData?.sunset) return;

        const now = new Date();
        const sunrise = new Date(state.sunData.sunrise);
        const sunset  = new Date(state.sunData.sunset);

        const phases = computePhaseSession(sunrise, sunset, now);

        // Sunrise / sunset row (12-hour format, consistent throughout)
        document.getElementById('sunriseTime').textContent = fmtClockTime(sunrise);
        document.getElementById('sunsetTime').textContent  = fmtClockTime(sunset);

        // Phase windows show full RANGES
        document.getElementById('winGolden').textContent  = fmtPhaseRange(phases.goldenStart, phases.goldenEnd);
        document.getElementById('winBlue').textContent    = fmtPhaseRange(phases.blueStart,   phases.blueEnd);
        document.getElementById('winSailing').textContent = fmtPhaseRange(phases.sailingStart, phases.sailingEnd);

        // Surface session in the title so morning vs evening is obvious at a glance
        const sessionLabel = document.getElementById('sessionLabel');
        if (sessionLabel) {
            sessionLabel.textContent = phases.session === 'morning' ? '🌅 morning' : '🌇 evening';
        }

        // Clear all active states
        document.getElementById('phaseGolden').classList.remove('active');
        document.getElementById('phaseBlue').classList.remove('active');
        document.getElementById('phaseSailing').classList.remove('active');

        // Sun position along the arc (unchanged - this is correct for full day)
        const total = sunset - sunrise;
        const elapsed = now - sunrise;
        const progress = Math.max(0, Math.min(1, elapsed / total));

        const angle = Math.PI * progress;
        const x = 50 - Math.cos(angle) * 42;
        const y = Math.sin(angle) * 70;

        const sunMarker = document.getElementById('sunMarker');
        sunMarker.style.left = `${x}%`;
        sunMarker.style.bottom = `${y}px`;

        const pill = document.getElementById('goldenPill');

        // Determine current active phase. Order of checks doesn't matter
        // because phase windows don't overlap, but check golden FIRST so
        // its "active" pill class wins if there's any boundary fuzziness.
        if (now >= phases.goldenStart && now < phases.goldenEnd) {
            pill.className = 'golden-pill active';
            pill.textContent = '🎬 Golden Hour';
            document.getElementById('phaseGolden').classList.add('active');
            sunMarker.textContent = '☀️';
        } else if (now >= phases.blueStart && now < phases.blueEnd) {
            pill.className = 'golden-pill soon';
            pill.textContent = '🌌 Blue Moment';
            document.getElementById('phaseBlue').classList.add('active');
            sunMarker.textContent = '🌙';
        } else if (now >= phases.sailingStart && now < phases.sailingEnd) {
            pill.className = 'golden-pill inactive';
            pill.textContent = '⛵ Sailing Time';
            document.getElementById('phaseSailing').classList.add('active');
            sunMarker.textContent = '🌙';
        } else {
            pill.className = 'golden-pill inactive';
            const isNight = (now < sunrise || now > sunset);
            pill.textContent = isNight ? 'Night' : 'Daylight';
            sunMarker.textContent = isNight ? '🌙' : '☀️';
        }
    }

    // ====================================================================
    // CUBS - shows the next scheduled game, or a live indicator if a game
    // is in progress right now. Pulls from the schedule endpoint which has
    // reliable per-event dates.
    // ====================================================================
    async function fetchCubsData() {
        try {
            const res = await fetch(CONFIG.ESPN_CUBS_SCHEDULE_URL);
            if (!res.ok) throw new Error(`ESPN schedule ${res.status}`);
            const json = await res.json();
            const events = Array.isArray(json.events) ? json.events : [];
            if (events.length === 0) return;

            const now = new Date();
            const stateOf = (e) => e?.status?.type?.state || null;

            // LIVE game takes priority; otherwise the earliest future-dated,
            // not-yet-started game.
            const live = events.find(e => stateOf(e) === 'in');
            const nextGame = live || events
                .filter(e => e?.date && new Date(e.date) > now && stateOf(e) !== 'post')
                .sort((a, b) => new Date(a.date) - new Date(b.date))[0]
                || null;

            renderCubsCard(nextGame, !!live);
            document.getElementById('cubsCard').classList.remove('hidden');
        } catch (e) {
            console.warn('Cubs schedule unavailable:', e.message);
        }
    }

    // Extract the two competitors as { chc, opp } regardless of which one
    // is "home" or "away" in the source data.
    function extractCompetitors(event) {
        const competitors = event?.competitions?.[0]?.competitors || [];
        let chc = null, opp = null;
        competitors.forEach(c => {
            if (c.team?.abbreviation === 'CHC') chc = c;
            else opp = c;
        });
        return { chc, opp };
    }

    // "vs Brewers" if Cubs are home, "@ Brewers" if Cubs are away.
    function buildMatchup(event) {
        const { chc, opp } = extractCompetitors(event);
        if (!opp?.team) return 'TBD';
        const oppName = opp.team.shortDisplayName || opp.team.name || opp.team.abbreviation || 'TBD';
        const isHome = chc?.homeAway === 'home';
        return `${isHome ? 'vs' : '@'} ${oppName}`;
    }

    function renderCubsCard(nextGame, isLive) {
        const headerPill = document.getElementById('cubsHeaderPill');
        const nextBlock  = document.getElementById('nextGameBlock');
        const nextMatchup = document.getElementById('nextMatchup');
        const nextMeta    = document.getElementById('nextMeta');

        // Header pill - only shown while a game is live
        headerPill.classList.remove('live');
        if (isLive && nextGame) {
            const detail = nextGame.status?.type?.shortDetail || nextGame.status?.type?.detail || 'Live';
            headerPill.classList.add('live');
            headerPill.textContent = `● ${detail}`;
            headerPill.hidden = false;
        } else {
            headerPill.hidden = true;
        }

        if (!nextGame) {
            nextBlock.classList.add('empty');
            nextMatchup.textContent = 'No upcoming games';
            nextMeta.textContent = '—';
            return;
        }

        nextBlock.classList.remove('empty');
        nextMatchup.textContent = buildMatchup(nextGame);

        const d = new Date(nextGame.date);
        const dayShort = d.toLocaleDateString('en-US', { weekday: 'short' });
        const datePart = d.toLocaleDateString('en-US', { month: 'numeric', day: 'numeric' });

        if (isLive) {
            // Show live status + running score in the meta slot
            const detail = nextGame.status?.type?.shortDetail || 'In Progress';
            const { chc, opp } = extractCompetitors(nextGame);
            const chcScore = chc?.score?.displayValue ?? chc?.score ?? '-';
            const oppScore = opp?.score?.displayValue ?? opp?.score ?? '-';
            nextMeta.innerHTML = `<span class="game-live-detail">${detail}</span> &nbsp; <span class="strong">${chcScore}–${oppScore}</span>`;
        } else {
            const timePart = fmtClockTime(d);
            nextMeta.innerHTML = `<span class="strong">${dayShort} ${datePart}</span> · ${timePart}`;
        }
    }

    // ====================================================================
    // CELESTIAL
    // ====================================================================
    async function fetchCelestial() {
        try {
            const res = await fetch(CONFIG.SUN_API_URL);
            if (!res.ok) return null;
            const json = await res.json();
            if (json.daily?.sunrise?.[0] && json.daily?.sunset?.[0]) {
                return { sunrise: json.daily.sunrise[0], sunset: json.daily.sunset[0] };
            }
            return null;
        } catch (e) {
            console.warn('Celestial fetch failed:', e.message);
            return null;
        }
    }

    // ====================================================================
    // AMBIENT - via Cloudflare Function proxy. No keys client-side.
    // ====================================================================
    async function fetchAmbientDevices() {
        try {
            const res = await fetch(CONFIG.AMBIENT_PROXY_URL);
            if (!res.ok) {
                console.warn(`Ambient proxy returned ${res.status}`);
                return null;
            }
            return await res.json();
        } catch (e) {
            console.warn('Ambient fetch failed:', e.message);
            return null;
        }
    }

    // ====================================================================
    // FORECAST - Open-Meteo hourly forecast. Stations are <1mi apart so
    // we fetch ONE forecast and display in both station dropdowns.
    // ====================================================================
    async function fetchForecast() {
        try {
            const res = await fetch(CONFIG.FORECAST_API_URL);
            if (!res.ok) return null;
            const json = await res.json();
            if (!json.hourly?.time || !Array.isArray(json.hourly.time)) return null;

            // Find first hourly slot that is current-or-future
            const now = new Date();
            const startIdx = json.hourly.time.findIndex(t => new Date(t) >= new Date(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours()));
            if (startIdx === -1) return null;

            const slice = (arr) => Array.isArray(arr) ? arr.slice(startIdx, startIdx + 10) : [];
            return {
                times: slice(json.hourly.time),
                temps: slice(json.hourly.temperature_2m),
                pops:  slice(json.hourly.precipitation_probability),
                codes: slice(json.hourly.weather_code),
                isDay: slice(json.hourly.is_day)
            };
        } catch (e) {
            console.warn('Forecast fetch failed:', e.message);
            return null;
        }
    }

    // WMO weather code (per Open-Meteo docs) -> emoji icon.
    // isDay = 1 during daylight hours, 0 at night.
    function wmoToIcon(code, isDay) {
        const day = isDay === 1;
        if (code === 0)                return day ? '☀️' : '🌙';
        if (code === 1)                return day ? '🌤️' : '🌙';
        if (code === 2)                return day ? '⛅' : '☁️';
        if (code === 3)                return '☁️';
        if (code === 45 || code === 48) return '🌫️';
        if (code >= 51 && code <= 55)  return '🌦️';
        if (code === 56 || code === 57) return '🌨️';
        if (code === 65 || code === 82) return '⛈️';
        if (code >= 61 && code <= 67)  return '🌧️';
        if (code >= 71 && code <= 77)  return '❄️';
        if (code === 80 || code === 81) return '🌦️';
        if (code === 85 || code === 86) return '❄️';
        if (code >= 95)                return '⛈️';
        return '☁️';
    }

    function updateForecast(rootEl, forecast) {
        const container = rootEl.querySelector('[data-field="forecast"]');
        if (!container) return;

        if (!forecast || !forecast.times || forecast.times.length === 0) {
            container.innerHTML = '<div class="forecast-empty">Forecast unavailable</div>';
            return;
        }

        const nowHour = new Date().getHours();

        const hoursHtml = forecast.times.map((time, i) => {
            const d = new Date(time);
            const isCurrentHour = d.getHours() === nowHour && i === 0;
            const timeLabel = (i === 0 && isCurrentHour)
                ? 'NOW'
                : d.toLocaleTimeString('en-US', { hour: 'numeric', hour12: true }).replace(' ', '');
            const icon = wmoToIcon(forecast.codes[i], forecast.isDay[i]);
            const temp = (typeof forecast.temps[i] === 'number') ? Math.round(forecast.temps[i]) : '--';
            const pop  = (typeof forecast.pops[i]  === 'number') ? forecast.pops[i] : 0;
            const popHtml = pop >= 10
                ? `<div class="forecast-pop">💧 ${pop}%</div>`
                : `<div class="forecast-pop dim">—</div>`;
            return `
                <div class="forecast-hour${isCurrentHour ? ' is-now' : ''}">
                    <div class="forecast-time">${timeLabel}</div>
                    <div class="forecast-icon" aria-hidden="true">${icon}</div>
                    <div class="forecast-temp">${temp}°</div>
                    ${popHtml}
                </div>`;
        }).join('');

        container.innerHTML = `<div class="forecast-scroll">${hoursHtml}</div>`;
    }

    function setupForecastToggle(rootEl) {
        const btn = rootEl.querySelector('.forecast-toggle');
        const content = rootEl.querySelector('.forecast-content');
        if (!btn || !content) return;
        btn.addEventListener('click', () => {
            const expanded = btn.getAttribute('aria-expanded') === 'true';
            btn.setAttribute('aria-expanded', String(!expanded));
            content.classList.toggle('expanded');
        });
    }

    // ====================================================================
    // STATION DOM - skeleton built ONCE, then fields are updated in place.
    // No more innerHTML thrash on every poll.
    // ====================================================================
    function buildStationSkeleton(config) {
        const div = document.createElement('article');
        div.className = 'station';
        div.dataset.stationId = config.id;

        // Optional sections built conditionally
        const solarCells = config.hasSolar
            ? `<div class="data-cell"><div class="data-icon" aria-hidden="true">☀️</div><div class="data-label">UV Index</div><div class="data-value" data-field="uv">--</div></div>
               <div class="data-cell"><div class="data-icon" aria-hidden="true">⚡</div><div class="data-label">Solar</div><div class="data-value" data-field="solar">--<span class="unit">w</span></div></div>`
            : '';

        const lightningSection = config.hasLightning
            ? `<div class="lightning-section">
                   <div class="lightning-icon-wrap" aria-hidden="true">⚡</div>
                   <div class="lightning-info">
                       <h4>Lightning Tracker</h4>
                       <div class="lightning-count" data-field="lightning">0<span class="period">strikes today</span></div>
                   </div>
               </div>`
            : '';

        div.innerHTML = `
            <div class="station-header">
                <div>
                    <div class="station-name">${config.name}</div>
                    <div class="station-location">${config.location}</div>
                </div>
                <span class="station-status offline" data-field="status">● Offline</span>
            </div>
            <div class="temp-section">
                <div class="temp-main">
                    <div class="temp-value"><span data-field="temp">--</span><span class="deg">°F</span></div>
                    <div class="temp-feels" data-field="feelsLike"></div>
                </div>
                <div class="condition-chip">
                    <div class="condition-icon" data-field="conditionIcon" aria-hidden="true">☁️</div>
                    <div class="condition-text" data-field="conditionText">--</div>
                </div>
            </div>
            <div class="comfort-section">
                <div class="comfort-ring-wrap">
                    <svg class="comfort-ring-svg" viewBox="0 0 160 160" aria-hidden="true">
                        <circle class="comfort-ring-bg" cx="80" cy="80" r="72"/>
                        <circle class="comfort-ring-fill" cx="80" cy="80" r="72" data-field="comfortRing"
                                stroke="#666" stroke-dasharray="${2 * Math.PI * 72}" stroke-dashoffset="${2 * Math.PI * 72}"/>
                    </svg>
                    <div class="comfort-center">
                        <div class="comfort-value" data-field="comfortScore">--</div>
                        <div class="comfort-label" data-field="comfortLabel">--</div>
                    </div>
                </div>
                <div class="comfort-desc" data-field="comfortDesc">Awaiting hardware sync...</div>
                <div class="comfort-tags" data-field="comfortTags"></div>
            </div>
            <div class="wind-section">
                <div class="compass-container" aria-hidden="true">
                    <div class="compass-ring"></div>
                    <div class="compass-dirs"><span class="n">N</span><span class="e">E</span><span class="s">S</span><span class="w">W</span></div>
                    <div class="compass-needle" data-field="compassNeedle" style="transform: translate(-50%, -100%) rotate(0deg);"></div>
                    <div class="compass-center-dot"></div>
                </div>
                <div class="wind-info">
                    <div class="wind-speed"><span data-field="windSpeed">--</span><span class="unit">mph</span></div>
                    <div class="wind-direction-text" data-field="windDirText">--</div>
                    <div class="wind-gust-alert hidden" data-field="windGust">⚠️ Gusts to -- mph</div>
                </div>
            </div>
            <div class="data-grid">
                <div class="data-cell"><div class="data-icon" aria-hidden="true">💧</div><div class="data-label">Humidity</div><div class="data-value" data-field="humidity">--<span class="unit">%</span></div></div>
                <div class="data-cell"><div class="data-icon" aria-hidden="true">🌡️</div><div class="data-label">Dew Point</div><div class="data-value" data-field="dewpt">--<span class="unit">°</span></div></div>
                <div class="data-cell"><div class="data-icon" aria-hidden="true">📊</div><div class="data-label">Pressure</div><div class="data-value" data-field="pressure">--<span class="unit">"</span></div></div>
                <div class="data-cell"><div class="data-icon" aria-hidden="true">🌧️</div><div class="data-label">Rain Today</div><div class="data-value" data-field="rain">--<span class="unit">"</span></div></div>
                ${solarCells}
            </div>
            ${lightningSection}
            <button class="forecast-toggle" type="button" aria-expanded="false" aria-controls="forecast-${config.id}">
                <span class="forecast-toggle-label"><span aria-hidden="true">📅</span> 10-Hour Forecast</span>
                <svg class="forecast-chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </button>
            <div class="forecast-content" id="forecast-${config.id}" data-field="forecast">
                <div class="forecast-empty">Loading forecast...</div>
            </div>
        `;

        return div;
    }

    function updateStation(rootEl, config, lastData) {
        // Helper: scoped field setter
        const setText = (field, value) => {
            const el = rootEl.querySelector(`[data-field="${field}"]`);
            if (el) el.textContent = value;
        };
        const setHTML = (field, html) => {
            const el = rootEl.querySelector(`[data-field="${field}"]`);
            if (el) el.innerHTML = html;
        };
        const setUnitValue = (field, value, unit) => {
            const el = rootEl.querySelector(`[data-field="${field}"]`);
            if (el) el.innerHTML = `${value}<span class="unit">${unit}</span>`;
        };

        // Status pill
        const statusEl = rootEl.querySelector('[data-field="status"]');

        if (!lastData || lastData.tempf === undefined) {
            statusEl.textContent = '● Offline';
            statusEl.classList.add('offline');
            setText('comfortDesc', 'Hardware sync pending. Verify direct data stream.');
            setText('comfortLabel', 'Offline');
            setText('comfortScore', '--');
            return;
        }

        statusEl.textContent = '● Live';
        statusEl.classList.remove('offline');

        // Extract values
        const temp        = safeNum(lastData.tempf);
        const humidity    = safeNum(lastData.humidity);
        const dewpt       = safeNum(lastData.dewPoint);
        const windSpeed   = safeNum(lastData.windspeedmph) ?? 0;
        const windDir     = safeNum(lastData.winddir) ?? 0;
        const windGust    = safeNum(lastData.windgustmph) ?? 0;
        const pressure    = safeNum(lastData.baromrelin);
        const precipTotal = safeNum(lastData.dailyrainin) ?? 0;
        const uv          = safeNum(lastData.uv) ?? 0;
        const solar       = safeNum(lastData.solarradiation) ?? 0;
        const lightning   = safeNum(lastData.lightning_day) ?? safeNum(lastData.lightning) ?? 0;
        const feelsLike   = safeNum(lastData.feelsLike);

        // Comfort
        const comfort = calculateComfort(temp, dewpt, windSpeed, uv, precipTotal);
        const circumference = 2 * Math.PI * 72;
        const offset = circumference - (comfort.score / 100) * circumference;

        const ring = rootEl.querySelector('[data-field="comfortRing"]');
        if (ring) {
            ring.setAttribute('stroke', comfort.color);
            ring.setAttribute('stroke-dashoffset', offset);
        }
        setText('comfortScore', comfort.score);
        setText('comfortLabel', comfort.label);
        setText('comfortDesc',  comfort.desc);

        const scoreEl = rootEl.querySelector('[data-field="comfortScore"]');
        const labelEl = rootEl.querySelector('[data-field="comfortLabel"]');
        if (scoreEl) scoreEl.style.color = comfort.color;
        if (labelEl) labelEl.style.color = comfort.color;

        // Tags
        const tagsContainer = rootEl.querySelector('[data-field="comfortTags"]');
        if (tagsContainer) {
            tagsContainer.innerHTML = comfort.tags
                .map(t => `<span class="comfort-tag">${t}</span>`)
                .join('');
        }

        // Temperature
        setText('temp', temp !== null ? Math.round(temp) : '--');
        if (feelsLike !== null && temp !== null && Math.round(feelsLike) !== Math.round(temp)) {
            setHTML('feelsLike', `Feels like <strong>${Math.round(feelsLike)}°</strong>`);
        } else {
            setText('feelsLike', '');
        }

        // Condition chip
        const condition = inferCondition(temp, precipTotal, solar, uv);
        setText('conditionIcon', condition.icon);
        setText('conditionText', condition.text);

        // Wind
        const needle = rootEl.querySelector('[data-field="compassNeedle"]');
        if (needle) needle.style.transform = `translate(-50%, -100%) rotate(${windDir}deg)`;

        setText('windSpeed', Math.round(windSpeed));
        const dirAbbr = getWindDirAbbr(windDir);
        const dirFull = getWindDirFull(dirAbbr);
        setText('windDirText', `From the ${dirFull} (${Math.round(windDir)}°)`);

        const gustEl = rootEl.querySelector('[data-field="windGust"]');
        if (gustEl) {
            if (windGust > windSpeed) {
                gustEl.textContent = `⚠️ Gusts to ${Math.round(windGust)} mph`;
                gustEl.classList.remove('hidden');
            } else {
                gustEl.classList.add('hidden');
            }
        }

        // Data cells
        setUnitValue('humidity', humidity !== null ? humidity : '--', '%');
        setUnitValue('dewpt',    dewpt    !== null ? Math.round(dewpt) : '--', '°');
        setUnitValue('pressure', pressure !== null ? pressure.toFixed(2) : '--', '"');
        setUnitValue('rain',     precipTotal.toFixed(2), '"');

        if (config.hasSolar) {
            setText('uv', uv);
            setUnitValue('solar', solar, 'w');
        }

        if (config.hasLightning) {
            setHTML('lightning', `${lightning}<span class="period">strikes today</span>`);
        }
    }

    // First-time render: inject skeletons, retire the loading state
    function ensureStationsRendered() {
        if (state.stationElements.size > 0) return; // already built

        const content = document.getElementById('content');
        content.innerHTML = ''; // clears the initial loading spinner

        CONFIG.STATIONS.forEach(cfg => {
            const el = buildStationSkeleton(cfg);
            content.appendChild(el);
            state.stationElements.set(cfg.id, el);
            setupForecastToggle(el);
        });
    }

    function matchDeviceToStation(devices, config, index) {
        if (!Array.isArray(devices)) return null;

        const byName = devices.find(d =>
            d?.info?.name?.toLowerCase().trim() === config.name.toLowerCase().trim()
        );
        if (byName) return byName;

        // Positional fallback. Surface it loudly so we know when it kicks in.
        if (devices[index]) {
            console.warn(`[stations] Name match failed for "${config.name}", falling back to positional device[${index}].`);
            return devices[index];
        }
        return null;
    }

    // ====================================================================
    // REFRESH ORCHESTRATION
    // ====================================================================
    async function refresh() {
        if (state.refreshInFlight) return;     // prevent double-click race
        state.refreshInFlight = true;
        // Reset countdown at the START so slow refreshes don't glitch
        // the visible countdown backwards on completion.
        state.countdown = CONFIG.POLL_INTERVAL_SECONDS;

        const btn = document.getElementById('refreshBtn');
        btn.setAttribute('aria-busy', 'true');
        btn.setAttribute('disabled', 'true');

        try {
            ensureStationsRendered();

            // All four fetches in parallel
            const [devices, astronomicalData, forecast, _cubs] = await Promise.all([
                fetchAmbientDevices(),
                fetchCelestial(),
                fetchForecast(),
                fetchCubsData()
            ]);

            if (astronomicalData) {
                state.sunData = astronomicalData;
                document.getElementById('sunCard').classList.remove('hidden');
                updateSunTracker();
            }

            if (forecast) {
                state.forecastData = forecast;
            }

            CONFIG.STATIONS.forEach((cfg, idx) => {
                const device = matchDeviceToStation(devices, cfg, idx);
                const rootEl = state.stationElements.get(cfg.id);
                if (rootEl) {
                    updateStation(rootEl, cfg, device?.lastData || null);
                    updateForecast(rootEl, state.forecastData);
                }
            });

            // Screen reader cue
            const sr = document.getElementById('srStatus');
            if (sr) sr.textContent = `Weather updated at ${fmtClockTime(new Date())}`;
        } finally {
            btn.setAttribute('aria-busy', 'false');
            btn.removeAttribute('disabled');
            state.refreshInFlight = false;
        }
    }

    // ====================================================================
    // TICK LOOP - drives countdown + clock once per second
    // ====================================================================
    function tick() {
        state.countdown--;
        if (state.countdown <= 0) {
            // refresh() resets countdown at its start, so just call it
            refresh();
        }
        document.getElementById('countdown').textContent = `${state.countdown}s`;
        updateClock();
    }

    // ====================================================================
    // BOOT
    // ====================================================================
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('refreshBtn').addEventListener('click', refresh);
        updateClock();
        refresh();
        setInterval(tick, CONFIG.TICK_MS);
    });
    </script>
</body>
