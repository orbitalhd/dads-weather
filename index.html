<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Franklin Weather">
    <link rel="apple-touch-icon" href="./icons/icon-192.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#080c14">
    <link rel="manifest" href="./manifest.json">
    
    <title>Franklin TN Real-Time Weather</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #080c14;
            --bg-card: #0f1521;
            --bg-elevated: #161d2d;
            --border-subtle: rgba(255,255,255,0.06);
            --border-medium: rgba(255,255,255,0.1);
            --text-primary: #f8fafc;
            --text-secondary: rgba(248,250,252,0.7);
            --text-muted: rgba(248,250,252,0.4);
            --accent-cyan: #22d3ee;
            --accent-emerald: #34d399;
            --accent-amber: #fbbf24;
            --accent-orange: #fb923c;
            --accent-rose: #fb7185;
            --accent-purple: #a78bfa;
            --accent-blue: #60a5fa;
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { height: 100%; -webkit-font-smoothing: antialiased; }
        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
            min-height: 100%;
            padding: 16px;
            padding-top: max(16px, env(safe-area-inset-top));
            padding-bottom: max(90px, calc(env(safe-area-inset-bottom) + 90px));
            line-height: 1.5;
        }
        .container { max-width: 480px; margin: 0 auto; }

        /* Header Layout */
        .header { text-align: center; padding: 8px 0 24px; }
        .clock { margin-bottom: 16px; }
        .clock-day { font-size: 11px; font-weight: 600; letter-spacing: 4px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
        .clock-time { font-family: 'Space Grotesk', monospace; font-size: 48px; font-weight: 700; letter-spacing: -2px; background: linear-gradient(180deg, var(--text-primary) 0%, rgba(248,250,252,0.6) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .clock-date { font-size: 14px; color: var(--text-secondary); margin-top: 2px; }
        .brand { display: inline-flex; align-items: center; gap: 10px; padding: 10px 18px; background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 100px; }
        .brand-icon { font-size: 20px; }
        .brand-text { font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: -0.3px; }
        .status-live { display: inline-flex; align-items: center; gap: 6px; margin-top: 12px; font-size: 11px; font-weight: 600; color: var(--accent-emerald); text-transform: uppercase; letter-spacing: 1px; }
        .status-dot { width: 6px; height: 6px; background: var(--accent-emerald); border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* Dashboard Cards */
        .station { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-xl); margin-bottom: 20px; overflow: hidden; }
        .station-header { display: flex; justify-content: space-between; align-items: flex-start; padding: 20px 20px 0; }
        .station-name { font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 2px; }
        .station-location { font-size: 12px; color: var(--text-muted); }
        .station-status { display: flex; align-items: center; gap: 5px; padding: 5px 10px; background: rgba(52, 211, 153, 0.1); border-radius: 100px; font-size: 10px; font-weight: 700; color: var(--accent-emerald); text-transform: uppercase; letter-spacing: 0.5px; }
        .station-status.offline { background: rgba(251, 113, 133, 0.1); color: var(--accent-rose); }

        /* Comfort Rings */
        .comfort-section { padding: 24px 20px 20px; text-align: center; }
        .comfort-ring-wrap { position: relative; width: 180px; height: 180px; margin: 0 auto 20px; }
        .comfort-ring-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
        .comfort-ring-bg { fill: none; stroke: var(--bg-elevated); stroke-width: 14; }
        .comfort-ring-fill { fill: none; stroke-width: 14; stroke-linecap: round; transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.5s ease; }
        .comfort-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        .comfort-value { font-family: 'Space Grotesk', monospace; font-size: 56px; font-weight: 700; line-height: 1; letter-spacing: -2px; }
        .comfort-label { font-size: 16px; font-weight: 700; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
        .comfort-desc { font-size: 15px; color: var(--text-secondary); max-width: 300px; margin: 0 auto 16px; line-height: 1.5; }
        .comfort-tags { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
        .comfort-tag { display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px; background: var(--bg-elevated); border-radius: 100px; font-size: 12px; font-weight: 500; color: var(--text-secondary); }

        /* Temperature layout */
        .temp-section { display: flex; align-items: center; justify-content: center; gap: 20px; padding: 0 20px 24px; }
        .temp-main { text-align: center; }
        .temp-value { font-family: 'Space Grotesk', monospace; font-size: 80px; font-weight: 700; line-height: 0.9; letter-spacing: -4px; }
        .temp-value .deg { font-size: 32px; font-weight: 500; opacity: 0.5; vertical-align: top; margin-left: -8px; }
        .temp-feels { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }
        .temp-feels strong { color: var(--text-primary); font-weight: 600; }
        .condition-chip { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 16px 20px; background: var(--bg-elevated); border-radius: var(--radius-md); }
        .condition-icon { font-size: 32px; }
        .condition-text { font-size: 13px; font-weight: 600; color: var(--text-secondary); }

        /* Compass Layout */
        .wind-section { display: flex; align-items: center; gap: 20px; padding: 0 20px 20px; }
        .compass-container { position: relative; width: 100px; height: 100px; flex-shrink: 0; }
        .compass-ring { position: absolute; inset: 0; border: 2px solid var(--border-medium); border-radius: 50%; background: var(--bg-elevated); }
        .compass-dirs { position: absolute; inset: 8px; font-size: 10px; font-weight: 700; color: var(--text-muted); }
        .compass-dirs span { position: absolute; }
        .compass-dirs .n { top: 2px; left: 50%; transform: translateX(-50%); color: var(--text-primary); }
        .compass-dirs .s { bottom: 2px; left: 50%; transform: translateX(-50%); }
        .compass-dirs .e { right: 2px; top: 50%; transform: translateY(-50%); }
        .compass-dirs .w { left: 2px; top: 50%; transform: translateY(-50%); }
        .compass-needle { position: absolute; top: 50%; left: 50%; width: 4px; height: 38px; transform-origin: bottom center; transform: translate(-50%, -100%) rotate(0deg); transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .compass-needle::before { content: ''; position: absolute; top: 0; left: -5px; border-left: 7px solid transparent; border-right: 7px solid transparent; border-bottom: 22px solid var(--accent-cyan); filter: drop-shadow(0 0 8px var(--accent-cyan)); }
        .compass-center-dot { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 12px; height: 12px; background: var(--text-primary); border-radius: 50%; box-shadow: 0 0 0 3px var(--bg-elevated); }
        .wind-info { flex: 1; }
        .wind-speed { font-family: 'Space Grotesk', monospace; font-size: 40px; font-weight: 700; line-height: 1; letter-spacing: -1px; }
        .wind-speed .unit { font-size: 16px; font-weight: 500; color: var(--text-secondary); margin-left: 4px; }
        .wind-direction-text { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }
        .wind-gust-alert { display: inline-flex; align-items: center; gap: 6px; margin-top: 10px; padding: 6px 12px; background: rgba(251, 146, 60, 0.15); border-radius: 100px; font-size: 13px; font-weight: 600; color: var(--accent-orange); }

        /* Data Matrix Grid */
        .data-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border-subtle); border-top: 1px solid var(--border-subtle); }
        .data-cell { background: var(--bg-card); padding: 18px 12px; text-align: center; }
        .data-icon { font-size: 22px; margin-bottom: 8px; }
        .data-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 4px; }
        .data-value { font-family: 'Space Grotesk', monospace; font-size: 20px; font-weight: 700; }
        .data-value .unit { font-size: 12px; font-weight: 500; color: var(--text-secondary); }

        /* Lightning Tracking Bar */
        .lightning-section { display: flex; align-items: center; gap: 16px; padding: 18px 20px; background: linear-gradient(135deg, rgba(167, 139, 250, 0.1) 0%, rgba(139, 92, 246, 0.05) 100%); border-top: 1px solid var(--border-subtle); }
        .lightning-icon-wrap { width: 52px; height: 52px; background: linear-gradient(135deg, #a78bfa 0%, #8b5cf6 100%); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 26px; box-shadow: 0 0 30px -8px rgba(167, 139, 250, 0.5); }
        .lightning-info h4 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 2px; }
        .lightning-count { font-family: 'Space Grotesk', monospace; font-size: 28px; font-weight: 700; color: var(--accent-purple); }
        .lightning-count .period { font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-left: 4px; }

        /* Forecast Dropdown */
        .forecast-toggle { width: 100%; padding: 16px 20px; background: transparent; border: none; border-top: 1px solid var(--border-subtle); color: var(--text-primary); font-family: inherit; font-size: 14px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: background 0.2s; }
        .forecast-toggle:active { background: var(--bg-elevated); }
        .forecast-toggle svg { transition: transform 0.3s ease; }
        .forecast-toggle.open svg { transform: rotate(180deg); }
        .forecast-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
        .forecast-content.open { max-height: 800px; }
        .forecast-item { padding: 18px 20px; border-top: 1px solid var(--border-subtle); }
        .forecast-period { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--accent-blue); margin-bottom: 6px; }
        .forecast-narrative { font-size: 14px; line-height: 1.6; color: var(--text-secondary); }

        /* Sports Tracker Layout Component */
        .sports-card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-xl); padding: 20px; margin-bottom: 20px; box-shadow: 0 12px 40px -12px rgba(0,0,0,0.5); }
        .sports-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .sports-title { font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .sports-pill { padding: 4px 10px; border-radius: 100px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; border: 1px solid rgba(96, 165, 250, 0.2); background: rgba(96, 165, 250, 0.08); color: var(--accent-blue); }

        /* Sun Tracker Arc Layout */
        .sun-card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-xl); padding: 20px; margin-bottom: 20px; }
        .sun-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .sun-title { font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .golden-pill { padding: 5px 12px; border-radius: 100px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .golden-pill.active { background: linear-gradient(135deg, rgba(251, 191, 36, 0.2) 0%, rgba(245, 158, 11, 0.2) 100%); color: var(--accent-amber); animation: goldenGlow 2s ease-in-out infinite; }
        .golden-pill.soon { background: rgba(251, 191, 36, 0.1); color: var(--accent-amber); }
        .golden-pill.inactive { background: var(--bg-elevated); color: var(--text-muted); }
        @keyframes goldenGlow { 0%, 100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.3); } 50% { box-shadow: 0 0 20px 4px rgba(251, 191, 36, 0.15); } }
        .sun-arc-wrap { position: relative; height: 90px; margin-bottom: 16px; }
        .sun-arc { position: absolute; bottom: 0; left: 8%; width: 84%; height: 75px; border: 2px dashed rgba(255,255,255,0.08); border-bottom: none; border-radius: 200px 200px 0 0; }
        .sun-marker { position: absolute; width: 32px; height: 32px; background: var(--accent-amber); border-radius: 50%; transform: translate(-50%, 50%); display: flex; align-items: center; justify-content: center; font-size: 16px; box-shadow: 0 0 24px var(--accent-amber); transition: all 0.5s ease; }
        .sun-horizon { position: absolute; bottom: 0; left: 4%; width: 92%; height: 2px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent); }
        .sun-times-row { display: flex; justify-content: space-between; padding: 0 4%; font-size: 12px; color: var(--text-muted); margin-bottom: 16px; }
        .sun-stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .sun-stat { text-align: center; padding: 14px; background: var(--bg-elevated); border-radius: var(--radius-sm); }
        .sun-stat-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 4px; }
        .sun-stat-value { font-family: 'Space Grotesk', monospace; font-size: 18px; font-weight: 700; }
        .sun-stat-value.gold { color: var(--accent-amber); }

        /* System Action Bar */
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 24px; padding-bottom: max(12px, env(safe-area-inset-bottom)); background: linear-gradient(to top, var(--bg-base) 70%, transparent); display: flex; justify-content: center; align-items: center; gap: 20px; z-index: 1000; }
        .countdown-text { font-family: 'Space Grotesk', monospace; font-size: 14px; font-weight: 600; color: var(--text-muted); min-width: 40px; text-align: center; }
        .refresh-btn { width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%); border: none; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 8px 32px -8px rgba(96, 165, 250, 0.5); transition: transform 0.2s, box-shadow 0.2s; }
        .refresh-btn:active { transform: scale(0.92); }
        .refresh-btn.spinning svg { animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-state { text-align: center; padding: 60px 20px; }
        .loading-spinner { width: 48px; height: 48px; border: 3px solid var(--bg-elevated); border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
        .loading-text { font-size: 14px; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="clock">
                <div class="clock-day" id="clockDay">---</div>
                <div class="clock-time" id="clockTime">--:--</div>
                <div class="clock-date" id="clockDate">---</div>
            </div>
            <div class="brand">
                <span class="brand-icon">☀️</span>
                <span class="brand-text">Franklin TN Real-Time Weather</span>
            </div>
            <div class="status-live">
                <span class="status-dot"></span>
                Live Data
            </div>
        </header>

        <main id="content">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <div class="loading-text">Connecting to stations...</div>
            </div>
        </main>

        <div class="sports-card" id="cubsCard" style="display: none;">
            <div class="sports-header">
                <span class="sun-title">🐻 Chicago Cubs Tracker</span>
                <span class="sports-pill">MLB</span>
            </div>
            <div class="sun-stats-row" style="grid-template-columns: 1fr; gap: 10px;">
                <div class="sun-stat" style="text-align: left;">
                    <div class="sun-stat-label">Next Chicago Cubs Game Coming Up</div>
                    <div class="sun-stat-value" id="cubsNextGame" style="font-family: inherit; font-size: 14px; margin-top: 4px; line-height: 1.4;">--</div>
                </div>
                <div class="sun-stat" style="text-align: left;">
                    <div class="sun-stat-label">Previous Game Final Score</div>
                    <div class="sun-stat-value gold" id="cubsPrevGame" style="font-size: 15px; margin-top: 4px;">--</div>
                </div>
            </div>
        </div>

        <div class="sun-card" id="sunCard" style="display: none;">
            <div class="sun-header">
                <span class="sun-title">🚁 Golden Hour Tracker</span>
                <span class="golden-pill inactive" id="goldenPill">Golden Hour</span>
            </div>
            <div class="sun-arc-wrap">
                <div class="sun-arc"></div>
                <div class="sun-marker" id="sunMarker">☀️</div>
                <div class="sun-horizon"></div>
            </div>
            <div class="sun-times-row">
                <span id="sunriseTime">--:--</span>
                <span id="sunsetTime">--:--</span>
            </div>
            <div class="sun-stats-row">
                <div class="sun-stat">
                    <div class="sun-stat-label">Daylight Left</div>
                    <div class="sun-stat-value" id="daylightLeft">--</div>
                </div>
                <div class="sun-stat">
                    <div class="sun-stat-label">Golden Hour</div>
                    <div class="sun-stat-value gold" id="goldenTime">--</div>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-bar">
        <span class="countdown-text" id="countdown">60s</span>
        <button class="refresh-btn" onclick="refresh()" id="refreshBtn">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12a9 9 0 11-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
                <path d="M21 3v5h-5"/>
            </svg>
        </button>
        <span class="countdown-text" style="opacity: 0;">60s</span>
    </div>

    <script>
        const API_KEY = 'c3fd2f9b93a64c1abd2f9b93a6ec1a87';
        
        const STATIONS = [
            { id: 'KTNFRANK244', name: 'Battlefield Park', location: 'Columbia Ave & Battle Ave', hasSolar: true, hasLightning: true },
            { id: 'KTNFRANK375', name: 'Heath Place', location: 'Off Carnton Lane', hasSolar: false, hasLightning: false }
        ];

        let countdown = 60;
        let sunData = null;

        function calculateComfortIndex(temp, dewpt, windSpeed, windGust, uv, precipRate) {
            if (temp === null) return { score: 0, label: 'Unknown', desc: 'Temperature metrics down', color: '#666', tags: [] };

            let effective = temp;
            let score = 100;
            let tags = [];

            if (effective <= 32) { score -= 50; tags.push('❄️ Freezing'); }
            else if (effective <= 50) { score -= 25; tags.push('Chilly'); }
            else if (effective <= 60) { score -= 10; tags.push('Mild'); }
            else if (effective <= 75) { score += 5; tags.push('👌 Ideal'); }
            else if (effective <= 85) { score -= 15; tags.push('Warm'); }
            else if (effective <= 95) { score -= 42; tags.push('🔥 Hot'); }
            else { score -= 65; tags.push('🥵 Extreme Heat'); }

            if (dewpt !== null && effective > 55) {
                if (dewpt >= 72) { score -= 25; tags.push('💦 Sticky'); }
                else if (dewpt >= 65) { score -= 14; tags.push('💧 Humid'); }
            }

            if (windSpeed > 25) { score -= 15; tags.push('💨 Windy'); }
            if (uv >= 7) { score -= 10; tags.push('☀️ High UV'); }
            if (precipRate > 0.05) { score -= 20; tags.push('🌧️ Rain'); }

            score = Math.max(0, Math.min(100, Math.round(score)));

            let label, desc, color;
            if (score >= 88) { label = 'Perfect'; desc = 'Exceptional outdoor conditions.'; color = '#34d399'; }
            else if (score >= 74) { label = 'Good'; desc = 'Pleasant baseline variables.'; color = '#84cc16'; }
            else if (score >= 50) { label = 'Moderate'; desc = 'Passable balance. Dress accordingly.'; color = '#f59e0b'; }
            else { label = 'Poor'; desc = 'Uncomfortable ambient environment.'; color = '#fb7185'; }

            return { score, label, desc, color, tags: tags.slice(0, 3) };
        }

        function getWeatherCondition(temp, humidity, wind, precip, solar, uv) {
            const hour = new Date().getHours();
            const isNight = hour < 6 || hour >= 21;

            if (precip > 0.2) return { icon: '⛈️', text: 'Heavy Rain' };
            if (precip > 0) return { icon: '🌧️', text: 'Rain' };
            if (temp !== null && temp <= 32) return { icon: '❄️', text: 'Freezing' };
            if (temp !== null && temp >= 90) return { icon: '☀️', text: 'Hot' };
            if (isNight) return { icon: '🌙', text: 'Clear Night' };
            if (solar > 400 || uv > 4) return { icon: '☀️', text: 'Sunny' };
            return { icon: '☁️', text: 'Cloudy' };
        }

        function getWindDir(degrees) {
            const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
            return dirs[Math.round(degrees / 22.5) % 16];
        }
        function getFullWindDir(abbr) {
            const map = {'N':'North','NNE':'North-Northeast','NE':'Northeast','ENE':'East-Northeast','E':'East','ESE':'East-Southeast','SE':'Southeast','SSE':'South-Southeast','S':'South','SSW':'South-Southwest','SW':'Southwest','WSW':'West-Southwest','W':'West','WNW':'West-Northwest','NW':'Northwest','NNW':'North-Northwest'};
            return map[abbr] || abbr;
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clockDay').textContent = now.toLocaleDateString('en-US', { weekday: 'long' }).toUpperCase();
            document.getElementById('clockTime').textContent = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
            document.getElementById('clockDate').textContent = now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
            if (sunData) updateSunTracker();
        }

        function updateSunTracker() {
            if (!sunData?.sunrise || !sunData?.sunset) return;
            const now = new Date();
            const sunrise = new Date(sunData.sunrise);
            const sunset = new Date(sunData.sunset);
            const goldenStart = new Date(sunset.getTime() - 60 * 60 * 1000);

            document.getElementById('sunriseTime').textContent = sunrise.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
            document.getElementById('sunsetTime').textContent = sunset.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
            document.getElementById('goldenTime').textContent = goldenStart.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

            const total = sunset - sunrise;
            const elapsed = now - sunrise;
            let progress = Math.max(0, Math.min(1, elapsed / total));

            const angle = Math.PI * progress;
            const x = 50 - Math.cos(angle) * 42;
            const y = 75 - Math.sin(angle) * 70;
            const sunMarker = document.getElementById('sunMarker');
            sunMarker.style.left = `${x}%`;
            sunMarker.style.bottom = `${y}px`;

            const remaining = sunset - now;
            const daylightEl = document.getElementById('daylightLeft');
            const pill = document.getElementById('goldenPill');

            if (now < sunrise || now > sunset) {
                daylightEl.textContent = 'Night';
                sunMarker.textContent = '🌙';
                pill.className = 'golden-pill inactive';
                pill.textContent = 'Golden Hour';
            } else {
                const h = Math.floor(remaining / 3600000);
                const m = Math.floor((remaining % 3600000) / 60000);
                daylightEl.textContent = `${h}h ${m}m`;
                sunMarker.textContent = '☀️';
                if (now >= goldenStart) {
                    pill.className = 'golden-pill active';
                    pill.textContent = `🎬 Active`;
                } else {
                    pill.className = 'golden-pill inactive';
                    pill.textContent = 'Golden Hour';
                }
            }
        }

        async function fetchCubsData() {
            try {
                const res = await fetch('https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/teams/chc');
                if (!res.ok) throw new Error('Network error');
                const json = await res.json();
                const team = json.team;
                if (!team) return;

                if (team.nextEvent?.[0]) {
                    const next = team.nextEvent[0];
                    const gameDate = new Date(next.date);
                    const numericDate = gameDate.toLocaleDateString('en-US', { month: '2-digit', day: '2-digit' });
                    const writtenDay = gameDate.toLocaleDateString('en-US', { weekday: 'long' });
                    const numericYear = gameDate.getFullYear();
                    const timeStr = gameDate.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
                    document.getElementById('cubsNextGame').innerHTML = `<strong>${numericDate}</strong>, ${writtenDay} <strong>${numericYear}</strong> @ ${timeStr}`;
                }

                const last = team.lastEvent?.[0] || team.lastEvent;
                if (last?.competitions?.[0]) {
                    const competitors = last.competitions[0].competitors || [];
                    let chcScore, oppScore, oppAbbr = 'OPP';
                    competitors.forEach(t => {
                        if (t.team?.abbreviation === 'CHC') chcScore = t.score?.displayValue || t.score;
                        else { oppScore = t.score?.displayValue || t.score; oppAbbr = t.team?.abbreviation || 'OPP'; }
                    });
                    if (chcScore !== undefined && oppScore !== undefined) {
                        const mark = parseInt(chcScore) > parseInt(oppScore) ? '🟢 W' : '🔴 L';
                        document.getElementById('cubsPrevGame').textContent = `CHC ${chcScore} - ${oppScore} ${oppAbbr} (${mark})`;
                    }
                }
                document.getElementById('cubsCard').style.display = 'block';
            } catch (e) { console.warn('Cubs stream unavailable'); }
        }

        async function fetchStation(stationId) {
            try {
                const url = `https://api.weather.com/v2/pws/observations/current?stationId=${stationId}&format=json&units=e&apiKey=${API_KEY}`;
                const res = await fetch(url);
                if (res.status === 204) return null; // Stale/Offline station hook
                if (!res.ok) return null;
                const json = await res.json();
                return json.observations?.[0] || null;
            } catch (e) { return null; }
        }

        async function fetchForecast(lat, lon) {
            try {
                const url = `https://api.weather.com/v3/wx/forecast/daily/5day?geocode=${lat},${lon}&format=json&units=e&language=en-US&apiKey=${API_KEY}`;
                const res = await fetch(url);
                return res.ok ? await res.json() : null;
            } catch (e) { return null; }
        }

        function renderStation(config, data, forecast) {
            if (!data || !data.imperial) {
                return `<div class="station"><div class="station-header"><div><div class="station-name">${config.name}</div><div class="station-location">${config.location}</div></div><span class="station-status offline">● Unreachable</span></div><div class="error-state" style="margin: 20px;">Weather Underground sync pending. Check station credentials.</div></div>`;
            }

            // PURE TYPE SAFETY EXTRACTION HOOKS (Ensures no automatic conversions to 0)
            const checkNum = (val) => (typeof val === 'number' && !isNaN(val)) ? val : null;

            const temp = checkNum(data.imperial.temp);
            const humidity = checkNum(data.humidity);
            const dewpt = checkNum(data.imperial.dewpt);
            const windSpeed = checkNum(data.imperial.windSpeed) ?? 0;
            const windDir = checkNum(data.winddir) ?? 0;
            const windGust = checkNum(data.imperial.windGust) ?? 0;
            const pressure = checkNum(data.imperial.pressure);
            const precipTotal = checkNum(data.imperial.precipTotal) ?? 0;
            const uv = checkNum(data.uv) ?? 0;
            const solar = checkNum(data.solarRadiation) ?? 0;

            let lightningCount = checkNum(data.lightning) ?? checkNum(data.lightningStrikeCount) ?? checkNum(data.lightning_day) ?? 0;

            const tempDisplay = (temp !== null) ? `${Math.round(temp)}` : '--';
            const feelsLikeDisplay = (temp !== null) ? `${Math.round(data.imperial.heatIndex || data.imperial.windChill || temp)}` : '--';
            const humidityDisplay = (humidity !== null) ? `${humidity}` : '--';
            const dewptDisplay = (dewpt !== null) ? `${Math.round(dewpt)}` : '--';
            const pressureDisplay = (pressure !== null) ? pressure.toFixed(2) : '--';

            const windDirAbbr = getWindDir(windDir);
            const windDirFull = getFullWindDir(windDirAbbr);
            const condition = getWeatherCondition(temp, humidity, windSpeed, precipTotal, solar, uv);
            const comfort = calculateComfortIndex(temp, dewpt, windSpeed, windGust, uv, precipTotal);

            const circumference = 2 * Math.PI * 72;
            const offset = circumference - (comfort.score / 100) * circumference;

            let forecastHtml = '';
            if (forecast?.daypart?.[0]) {
                const dp = forecast.daypart[0];
                let startIdx = dp.temperature?.[0] === null ? 1 : 0;
                for (let i = startIdx; i < Math.min(startIdx + 3, dp.daypartName?.length ?? 0); i++) {
                    forecastHtml += `<div class="forecast-item"><div class="forecast-period">${dp.daypartName[i]}</div><div class="forecast-narrative">${dp.narrative?.[i] || 'Unavailable'}</div></div>`;
                }
            }
            if (!forecastHtml) forecastHtml = '<div class="forecast-item"><div class="forecast-narrative">Extended data unavailable</div></div>';

            const uid = config.id;

            let dataCells = `
                <div class="data-cell"><div class="data-icon">💧</div><div class="data-label">Humidity</div><div class="data-value">${humidityDisplay}<span class="unit">%</span></div></div>
                <div class="data-cell"><div class="data-icon">🌡️</div><div class="data-label">Dew Point</div><div class="data-value">${dewptDisplay}<span class="unit">°</span></div></div>
                <div class="data-cell"><div class="data-icon">📊</div><div class="data-label">Pressure</div><div class="data-value">${pressureDisplay}<span class="unit">"</span></div></div>
                <div class="data-cell"><div class="data-icon">🌧️</div><div class="data-label">Rain Today</div><div class="data-value">${precipTotal.toFixed(2)}<span class="unit">"</span></div></div>`;

            if (config.hasSolar) {
                dataCells += `<div class="data-cell"><div class="data-icon">☀️</div><div class="data-label">UV Index</div><div class="data-value">${uv}</div></div>`;
                dataCells += `<div class="data-cell"><div class="data-icon">⚡</div><div class="data-label">Solar</div><div class="data-value">${solar}<span class="unit">w</span></div></div>`;
            }

            let lightningHtml = '';
            if (config.hasLightning) {
                lightningHtml = `
                    <div class="lightning-section">
                        <div class="lightning-icon-wrap">⚡</div>
                        <div class="lightning-info">
                            <h4>Lightning Tracker</h4>
                            <div class="lightning-count">${lightningCount}<span class="period">strikes today</span></div>
                        </div>
                    </div>`;
            }

            return `
                <div class="station">
                    <div class="station-header"><div><div class="station-name">${config.name}</div><div class="station-location">${config.location}</div></div><span class="station-status">● Live</span></div>
                    <div class="comfort-section">
                        <div class="comfort-ring-wrap">
                            <svg class="comfort-ring-svg" viewBox="0 0 160 160">
                                <circle class="comfort-ring-bg" cx="80" cy="80" r="72"/>
                                <circle class="comfort-ring-fill" cx="80" cy="80" r="72" stroke="${comfort.color}" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"/>
                            </svg>
                            <div class="comfort-center">
                                <div class="comfort-value" style="color: ${comfort.color}">${comfort.score}</div>
                                <div class="comfort-label" style="color: ${comfort.color}">${comfort.label}</div>
                            </div>
                        </div>
                        <div class="comfort-desc">${comfort.desc}</div>
                        ${comfort.tags.length > 0 ? `<div class="comfort-tags">${comfort.tags.map(t => `<span class="comfort-tag">${t}</span>`).join('')}</div>` : ''}
                    </div>
                    <div class="temp-section">
                        <div class="temp-main">
                            <div class="temp-value">${tempDisplay}<span class="deg">°F</span></div>
                            ${tempDisplay !== feelsLikeDisplay ? `<div class="temp-feels">Feels like <strong>${feelsLikeDisplay}°</strong></div>` : ''}
                        </div>
                        <div class="condition-chip"><div class="condition-icon">${condition.icon}</div><div class="condition-text">${condition.text}</div></div>
                    </div>
                    <div class="wind-section">
                        <div class="compass-container">
                            <div class="compass-ring"></div>
                            <div class="compass-dirs"><span class="n">N</span><span class="e">E</span><span class="s">S</span><span class="w">W</span></div>
                            <div class="compass-needle" style="transform: translate(-50%, -100%) rotate(${windDir}deg);"></div>
                            <div class="compass-center-dot"></div>
                        </div>
                        <div class="wind-info">
                            <div class="wind-speed">${Math.round(windSpeed)}<span class="unit">mph</span></div>
                            <div class="wind-direction-text">From the ${windDirFull} (${windDir}°)</div>
                            ${windGust > windSpeed ? `<div class="wind-gust-alert">⚠️ Gusts to ${Math.round(windGust)} mph</div>` : ''}
                        </div>
                    </div>
                    <div class="data-grid">${dataCells}</div>
                    ${lightningHtml}
                    <button class="forecast-toggle" onclick="toggleForecast('${uid}')" id="btn-${uid}">
                        📋 Extended Outlook
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M6 9l6 6 6-6"/></svg>
                    </button>
                    <div class="forecast-content" id="forecast-${uid}">${forecastHtml}</div>
                </div>`;
        }

        function toggleForecast(id) {
            document.getElementById(`forecast-${id}`).classList.toggle('open');
            document.getElementById(`btn-${id}`).classList.toggle('open');
        }

        // Snap Async Request Engine
        async function refresh() {
            const btn = document.getElementById('refreshBtn');
            const content = document.getElementById('content');
            btn.classList.add('spinning');

            fetchCubsData();

            const stationPromises = STATIONS.map(async (station) => {
                const data = await fetchStation(station.id);
                let forecast = null;

                if (data?.lat && data?.lon) {
                    forecast = await fetchForecast(data.lat, data.lon);
                    if (!sunData && forecast) {
                        sunData = { sunrise: forecast.sunriseTimeLocal?.[0], sunset: forecast.sunsetTimeLocal?.[0] };
                        setTimeout(() => {
                            document.getElementById('sunCard').style.display = 'block';
                            updateSunTracker();
                        }, 0);
                    }
                }
                return renderStation(station, data, forecast);
            });

            const htmlCards = await Promise.all(stationPromises);
            content.innerHTML = htmlCards.join('');
            
            countdown = 60;
            btn.classList.remove('spinning');
        }

        function tick() {
            countdown--;
            if (countdown <= 0) { refresh(); countdown = 60; }
            document.getElementById('countdown').textContent = `${countdown}s`;
            updateClock();
        }

        document.addEventListener('DOMContentLoaded', () => { 
            updateClock(); 
            refresh(); 
            setInterval(tick, 1000); 
        });
    </script>
</body>
</html>
